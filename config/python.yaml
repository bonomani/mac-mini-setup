# Python configuration — used by component python
#
# python_version is a UIC preference (default: 3.12.3); override in preferences.env
# pyenv_packages are the brew formulae installed alongside pyenv
# pip_bootstrap are always-upgraded core pip packages

pyenv_packages:
  - pyenv
  - pyenv-virtualenv

pip_bootstrap:
  - pip
  - setuptools
  - wheel
