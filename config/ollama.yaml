# Ollama configuration — used by component ollama
macos_min_version: "14"
installer_url: "https://ollama.com/install.sh"
api_host: "127.0.0.1"
api_port: "11434"
log_file: "/tmp/ollama.log"

# Model sets — controlled by UIC preference ollama-model-autopull (none|small|medium|large)
# Default is none — no automatic downloads.

# small: models <= 3B (fast, low memory)
small:
  - llama3.2
  - nomic-embed-text

# medium: models <= 8B (balanced)
medium:
  - qwen3:latest
  - llama3.1:8b
  - mistral:7b

# large: all models (requires ~60 GB free disk)
large:
  - qwen2.5-coder:32b
  - llama3.1:70b
