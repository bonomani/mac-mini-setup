
decision_id: mac-mini-setup-bgs-001
bgs_slice: BGS-State-Modeled-Governed
declared_scope: >
  AI workstation setup — full installation lifecycle across 10 governed
  components (10 active). macOS is the primary/full profile; Linux and WSL2
  run most components via the platform-aware package driver with macOS-only
  targets skipped.
  Software layer (ucc/software/): software-bootstrap, cli-tools, node-stack,
  vscode-stack, docker, ai-python-stack, ai-apps, build-tools.
  System layer (ucc/system/): system.
  Verification (tic/): verify + integration.
  Covers install, check (drift detection), update, and interactive modes.

decision_reason: >
  Stateful governed scope: depends on explicit installation, configuration,
  readiness, runtime, and recovery semantics across the listed components.
  CR-1b orients the target slice to ASM-based; the smallest sufficient
  ASM-based slice that fits the governed preflight + governed execution
  semantics is BGS-State-Modeled-Governed (CR-1a). UIC provides preflight
  gates and an explicit hard/soft gate model; UCC provides convergence
  against the ASM-aligned setup state model. TIC is used as additional
  post-convergence verification evidence but is not relied on as a slice
  member; the slice claim therefore stays SMG and not SMGV.

