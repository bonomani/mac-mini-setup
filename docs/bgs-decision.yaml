# Grade-2 additive declarations (BGS-EXTENSION-MODEL.md).
# software-model@1.0 is ASM's frozen profile; mac-mini-setup uses its
# state_model: package|config|service|... vocabulary throughout the YAML.
profiles:
  - software-model@1.0

policies: []

external_controls:
  iam_and_authorization: delegated
  # macOS user permissions and brew/npm/Docker Hub auth are handled by the
  # upstream toolchain. Targets requiring sudo use a capability target
  # (sudo-available) and admin_required metadata; operators may pre-acquire
  # a sudo ticket with `sudo -v` or run as root. Privilege elevation uses
  # `run_elevated`, which skips sudo when EUID=0 and uses sudo otherwise.
  # `sudo_is_available` checks EUID=0 OR cached sudo ticket. All sudo calls
  # are guarded — no interactive password prompt.
  sandboxing_or_runtime_isolation: implemented
  # AI app services run in Docker containers (ai-apps). Unsloth Studio runs
  # in an isolated Python venv via launchd/systemd.
  secret_and_token_lifecycle: not_applicable
  # No secrets managed by this installer.
  rate_limiting_and_budget_control: implemented
  # Docker resource limits enforced via parametric target. Ollama model
  # autopull defaults to 'none' (UIC preference). AI apps image policy
  # defaults to 'reuse-local'.
  privacy_and_data_boundary_control: delegated
  # Network calls go to upstream registries. No telemetry emitted. Brew
  # analytics explicitly disabled.

