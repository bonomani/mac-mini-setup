owner: bonomani
date: 2026-04-07

limitations:
  - macOS remains the full-profile target. Linux/WSL2 run most software
    targets via the package driver; macOS-only components (system, docker
    desktop) are skipped on non-macOS platforms.
  - Does not manage credentials or API tokens.
  - TIC tests are read-only probes; they do not re-run convergence.
  - Sudo availability is a capability target; admin targets cascade-fail
    gracefully when no non-interactive sudo ticket exists.
  - The repo uses project-local package specialization on the ASM
    software-model@1.0 profile.
  - The claimed BGS slice is BGS-State-Modeled-Governed; TIC is used as
    additional verification evidence but not as a slice-required member.

known_exclusions:
  - Multi-host orchestration (single-machine scope only).
  - Credential / secret management.
  - Reverse migrations across package managers (one-way only via the
    foreign-install handler).
