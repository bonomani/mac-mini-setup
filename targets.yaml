targets:
  xcode-command-line-tools:
    component: 01-homebrew
    profile: configured
    provided_by_tool: macos-installer

  homebrew:
    component: 01-homebrew
    profile: configured
    depends_on:
      - xcode-command-line-tools
    provided_by_tool: brew-installer

  git:
    component: 02-git
    profile: configured
    depends_on:
      - homebrew
    provided_by_tool: brew

  git-global-config:
    component: 02-git
    profile: configured
    depends_on:
      - git

  docker-desktop:
    component: 03-docker
    profile: configured
    depends_on:
      - homebrew
    provided_by_tool: brew-cask

  docker-resources-48gb:
    component: 03-docker
    profile: configured
    depends_on:
      - docker-desktop
    soft_depends_on:
      - gate:docker-settings-file

  pyenv:
    component: 04-python
    profile: configured
    depends_on:
      - homebrew
    provided_by_tool: brew

  python-3.12.3:
    component: 04-python
    profile: configured
    depends_on:
      - pyenv

  pip-latest:
    component: 04-python
    profile: configured
    depends_on:
      - python-3.12.3

  ollama:
    component: 05-ollama
    profile: configured
    depends_on:
      - macos-14-precondition
    provided_by_tool: ollama-installer

  macos-14-precondition:
    component: 05-ollama
    profile: configured

  ollama-service:
    component: 05-ollama
    profile: runtime
    depends_on:
      - ollama
    soft_depends_on:
      - gate:ollama-api

  unsloth-studio-setup:
    component: 06-ai-python-stack
    profile: configured
    depends_on:
      - python-3.12.3
      - pip-latest

  unsloth-studio-launchd:
    component: 06-ai-python-stack
    profile: runtime
    depends_on:
      - unsloth-studio-setup

  docker-running:
    component: 07-ai-apps
    profile: runtime
    depends_on:
      - docker-desktop
    soft_depends_on:
      - gate:docker-daemon

  ai-stack-compose-file:
    component: 07-ai-apps
    profile: configured

  ai-stack-running:
    component: 07-ai-apps
    profile: runtime
    depends_on:
      - docker-running
      - ai-stack-compose-file
    provided_by_tool: docker-compose

  vscode:
    component: 08-dev-tools
    profile: configured
    depends_on:
      - homebrew
    provided_by_tool: brew-cask

  vscode-code-cmd:
    component: 08-dev-tools
    profile: configured
    depends_on:
      - vscode

  vscode-settings:
    component: 08-dev-tools
    profile: configured
    depends_on:
      - vscode

  node-24-lts:
    component: 08-dev-tools
    profile: configured
    depends_on:
      - homebrew
    provided_by_tool: brew

  oh-my-zsh:
    component: 08-dev-tools
    profile: configured

  omz-theme-agnoster:
    component: 08-dev-tools
    profile: configured
    depends_on:
      - oh-my-zsh

  home-bin-in-path:
    component: 08-dev-tools
    profile: configured

  ai-healthcheck:
    component: 08-dev-tools
    profile: configured
    depends_on:
      - home-bin-in-path

  ariaflow:
    component: 08-dev-tools
    profile: configured
    depends_on:
      - homebrew
    provided_by_tool: brew

  aria2-launchd:
    component: 08-dev-tools
    profile: runtime
    depends_on:
      - ariaflow

  ariaflow-web:
    component: 08-dev-tools
    profile: configured
    depends_on:
      - ariaflow
    provided_by_tool: brew

  ariaflow-web-service:
    component: 08-dev-tools
    profile: runtime
    depends_on:
      - ariaflow-web

  pmset-ac-sleep=0:
    component: 09-macos-defaults
    profile: configured
    soft_depends_on:
      - gate:sudo-available

  pmset-disksleep=0:
    component: 09-macos-defaults
    profile: configured
    soft_depends_on:
      - gate:sudo-available

  pmset-standby=0:
    component: 09-macos-defaults
    profile: configured
    soft_depends_on:
      - gate:sudo-available

  app-nap=disabled:
    component: 09-macos-defaults
    profile: configured
    soft_depends_on:
      - gate:sudo-available

  finder-show-hidden=1:
    component: 09-macos-defaults
    profile: configured
    soft_depends_on:
      - gate:sudo-available

  show-all-extensions=1:
    component: 09-macos-defaults
    profile: configured
    soft_depends_on:
      - gate:sudo-available

  dock-autohide=1:
    component: 09-macos-defaults
    profile: configured
    soft_depends_on:
      - gate:sudo-available
