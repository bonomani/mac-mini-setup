component: ai-apps
primary_profile: runtime
libs: ai_apps
runner: run_ai_apps_from_yaml
on_fail: ignore
targets:
  docker-running:
    component: ai-apps
    profile: runtime
    type: runtime
    depends_on:
      - docker-desktop
    soft_depends_on:
      - gate:docker-daemon

  ai-stack-compose-file:
    component: ai-apps
    profile: configured
    type: config

  ai-stack-running:
    component: ai-apps
    profile: runtime
    type: runtime
    depends_on:
      - docker-running
      - ai-stack-compose-file
    provided_by_tool: docker-compose

compose_dir: ".ai-stack"
compose_marker: "# ai-stack v2"

services:
  - open-webui
  - flowise
  - openhands
  - n8n
  - qdrant
