component: 05-ollama
primary_profile: runtime
libs: ollama_models ollama
runner: run_ollama_from_yaml
on_fail: ignore
macos_min_version: 14
installer_url: https://ollama.com/install.sh
api_host: 127.0.0.1
api_port: 11434
log_file: /tmp/ollama.log
targets:
  macos-precondition:
    component: 05-ollama
    profile: configured
    type: precondition

  ollama:
    component: 05-ollama
    profile: configured
    type: package
    depends_on:
      - macos-precondition
    provided_by_tool: ollama-installer

  ollama-service:
    component: 05-ollama
    profile: runtime
    type: service
    depends_on:
      - ollama
    soft_depends_on:
      - gate:ollama-api
