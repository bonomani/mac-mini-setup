component: ollama
primary_profile: runtime
libs: ollama_models ollama
runner: run_ollama_from_yaml
on_fail: ignore
macos_min_version: 14
installer_url: https://ollama.com/install.sh
api_host: 127.0.0.1
api_port: 11434
log_file: /tmp/ollama.log
targets:
  macos-precondition:
    component: ollama
    profile: configured
    type: precondition

  ollama:
    component: ollama
    profile: configured
    type: package
    depends_on:
      - macos-precondition
    provided_by_tool: ollama-installer

  ollama-service:
    component: ollama
    profile: runtime
    type: service
    depends_on:
      - ollama
    soft_depends_on:
      - gate:ollama-api

# Model sets — controlled by UIC preference ollama-model-autopull (none|small|medium|large)
# Default is none — no automatic downloads.

small:
  - llama3.2
  - nomic-embed-text

medium:
  - qwen3:latest
  - llama3.1:8b
  - mistral:7b

large:
  - qwen2.5-coder:32b
  - llama3.1:70b
