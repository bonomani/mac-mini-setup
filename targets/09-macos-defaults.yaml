component: macos-defaults
primary_profile: configured
libs: macos_defaults
runner: run_macos_defaults_from_yaml
targets:
  pmset-ac-sleep=0:
    component: macos-defaults
    profile: configured
    type: config
    soft_depends_on:
      - gate:sudo-available

  pmset-disksleep=0:
    component: macos-defaults
    profile: configured
    type: config
    soft_depends_on:
      - gate:sudo-available

  pmset-standby=0:
    component: macos-defaults
    profile: configured
    type: config
    soft_depends_on:
      - gate:sudo-available

  app-nap=disabled:
    component: macos-defaults
    profile: configured
    type: config
    soft_depends_on:
      - gate:sudo-available

  finder-show-hidden=1:
    component: macos-defaults
    profile: configured
    type: config
    soft_depends_on:
      - gate:sudo-available

  show-all-extensions=1:
    component: macos-defaults
    profile: configured
    type: config
    soft_depends_on:
      - gate:sudo-available

  dock-autohide=1:
    component: macos-defaults
    profile: configured
    type: config
    soft_depends_on:
      - gate:sudo-available
