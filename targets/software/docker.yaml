component: docker
primary_profile: configured
libs: docker
runner: run_docker_from_yaml

targets:
  docker-desktop:
    component: docker
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew-cask
    oracle:
      configured: "[[ -d /Applications/Docker.app ]]"
      runtime: "docker info >/dev/null 2>&1"
