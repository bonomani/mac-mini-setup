component: 08-dev-tools
primary_profile: runtime
libs: vscode_ext dev_tools
runner: run_dev_tools_from_yaml
node_version: 24
node_previous_version: 20
omz_theme: agnoster
omz_installer_url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
ariaflow_tap: bonomani/ariaflow
aria2_port: 6800
ariaflow_web_port: 8001
targets:
  vscode:
    component: 08-dev-tools
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew-cask

  vscode-code-cmd:
    component: 08-dev-tools
    profile: configured
    type: config
    depends_on:
      - vscode

  vscode-settings:
    component: 08-dev-tools
    profile: configured
    type: config
    depends_on:
      - vscode

  node-lts:
    component: 08-dev-tools
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew

  oh-my-zsh:
    component: 08-dev-tools
    profile: configured
    type: config

  omz-theme-agnoster:
    component: 08-dev-tools
    profile: configured
    type: config
    depends_on:
      - oh-my-zsh

  home-bin-in-path:
    component: 08-dev-tools
    profile: configured
    type: config

  ai-healthcheck:
    component: 08-dev-tools
    profile: configured
    type: config
    depends_on:
      - home-bin-in-path

  ariaflow:
    component: 08-dev-tools
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew

  aria2-launchd:
    component: 08-dev-tools
    profile: runtime
    type: service
    depends_on:
      - ariaflow

  ariaflow-web:
    component: 08-dev-tools
    profile: configured
    type: package
    depends_on:
      - ariaflow
    provided_by_tool: brew

  ariaflow-web-service:
    component: 08-dev-tools
    profile: runtime
    type: service
    depends_on:
      - ariaflow-web
