component: dev-tools
primary_profile: runtime
libs: vscode_ext dev_tools
runner: run_dev_tools_from_yaml
node_version: 24
node_previous_version: 20
omz_theme: agnoster
omz_installer_url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
ariaflow_tap: bonomani/ariaflow
aria2_port: 6800
ariaflow_web_port: 8001
targets:
  vscode:
    component: dev-tools
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew-cask

  vscode-code-cmd:
    component: dev-tools
    profile: configured
    type: config
    depends_on:
      - vscode

  vscode-settings:
    component: dev-tools
    profile: configured
    type: config
    depends_on:
      - vscode

  node-lts:
    component: dev-tools
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew

  oh-my-zsh:
    component: dev-tools
    profile: configured
    type: config

  omz-theme-agnoster:
    component: dev-tools
    profile: configured
    type: config
    depends_on:
      - oh-my-zsh

  home-bin-in-path:
    component: dev-tools
    profile: configured
    type: config

  ai-healthcheck:
    component: dev-tools
    profile: configured
    type: config
    depends_on:
      - home-bin-in-path

  ariaflow:
    component: dev-tools
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew

  aria2-launchd:
    component: dev-tools
    profile: runtime
    type: service
    depends_on:
      - ariaflow

  ariaflow-web:
    component: dev-tools
    profile: configured
    type: package
    depends_on:
      - ariaflow
    provided_by_tool: brew

  ariaflow-web-service:
    component: dev-tools
    profile: runtime
    type: service
    depends_on:
      - ariaflow-web

# Homebrew formula CLI tools
cli_tools:
  - jq
  - wget
  - curl
  - htop
  - tmux
  - fzf
  - ripgrep
  - fd
  - tree
  - uv
  - pnpm
  - gcc
  - gh
  - llama.cpp
  - opencode
  - aria2
  - xz
  - cmake

# VSCode marketplace extensions
# Note: Claude Code is a CLI tool (npm), not a VSCode marketplace extension
vscode_extensions:
  - ms-python.python
  - ms-python.vscode-pylance
  - ms-toolsai.jupyter
  - ms-vscode.cpptools
  - continue.continue
  - eamodio.gitlens
  - ms-vscode-remote.remote-containers

# npm global packages
npm_packages:
  - "@openai/codex"
  - "@anthropic-ai/claude-code"
  - bmad-method

node_version: "24"
node_previous_version: "20"

# Oh My Zsh
omz_installer_url: "https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh"
omz_theme: "agnoster"

# Ariaflow brew tap and service ports
ariaflow_tap: "bonomani/ariaflow"
aria2_port: "6800"
ariaflow_web_port: "8001"

# Homebrew cask GUI tools
# Fields: name (ucc-target name), id (brew cask identifier)
casks:
  - name: iterm2
    id: iterm2
  - name: lm-studio
    id: lm-studio
