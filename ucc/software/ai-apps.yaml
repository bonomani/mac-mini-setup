component: ai-apps
primary_profile: runtime
libs: ai_apps ollama_models
runner: run_ai_apps_from_yaml
on_fail: ignore
platforms:
- macos
- linux
- wsl2
installer_url: https://ollama.com/install.sh
brew_service_name: ollama
api_host: 127.0.0.1
api_port: 11434
api_tags_path: /api/tags
log_file: /tmp/ollama.log
fallback_stop_pattern: ollama (serve|app)
fallback_start_cmd: ollama serve
macos_min_version: 14
stack:
  compose_dir: .ai-stack
  compose_file: docker-compose.yml
  definition_template: stack/docker-compose.yml
  marker: '# ai-stack v2'
  services:
  - open-webui
  - flowise
  - openhands
  - n8n
  - qdrant
targets:
  ai-stack-compose-file:
    component: ai-apps
    profile: parametric
    type: config
    state_model: parametric
    display_name: compose file
    driver:
      kind: compose-file
      path_env: COMPOSE_FILE
  open-webui-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Open WebUI
    depends_on:
    - docker-desktop
    - ai-stack-compose-file
    provided_by_tool: docker-compose
    driver:
      kind: docker-compose-service
      service_name: open-webui
    runtime_manager: docker-compose
    probe_kind: http
    endpoints:
    - name: Open WebUI
      scheme: http
      host: localhost
      port: 3000
  flowise-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Flowise
    depends_on:
    - docker-desktop
    - ai-stack-compose-file
    provided_by_tool: docker-compose
    driver:
      kind: docker-compose-service
      service_name: flowise
    runtime_manager: docker-compose
    probe_kind: http
    endpoints:
    - name: Flowise
      scheme: http
      host: localhost
      port: 3001
  openhands-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: OpenHands
    depends_on:
    - docker-desktop
    - ai-stack-compose-file
    provided_by_tool: docker-compose
    driver:
      kind: docker-compose-service
      service_name: openhands
    runtime_manager: docker-compose
    probe_kind: http
    endpoints:
    - name: OpenHands
      scheme: http
      host: localhost
      port: 3002
  n8n-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: n8n
    depends_on:
    - docker-desktop
    - ai-stack-compose-file
    provided_by_tool: docker-compose
    driver:
      kind: docker-compose-service
      service_name: n8n
    runtime_manager: docker-compose
    probe_kind: http
    endpoints:
    - name: n8n
      scheme: http
      host: localhost
      port: 5678
  qdrant-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Qdrant
    depends_on:
    - docker-desktop
    - ai-stack-compose-file
    provided_by_tool: docker-compose
    driver:
      kind: docker-compose-service
      service_name: qdrant
    runtime_manager: docker-compose
    probe_kind: http
    endpoints:
    - name: Qdrant
      scheme: http
      host: localhost
      port: 6333
      path: /collections
  ollama-host-supported:
    component: ai-apps
    profile: configured
    type: precondition
    state_model: config
    display_name: Ollama host support
    driver:
      kind: custom
    oracle:
      configured: ollama_host_supported
    evidence:
      platform: echo_var "${HOST_PLATFORM:-unknown}"
      version: host_os_version
    actions:
      install: ollama_unsupported_warn
  ollama:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Ollama
    depends_on:
    - ollama-host-supported
    soft_depends_on:
    - gate:ollama-api
    provided_by_tool: ollama-installer
    driver:
      kind: custom-daemon
      bin: ollama
      process: 'ollama (serve|app)'
    endpoints:
    - name: Ollama API
      scheme: http
      host: ${api_host}
      port: ${api_port}
      path: ${api_tags_path}
      note: ollama pull <model>
    stopped_health: Unavailable
  ollama-model-llama3.2:
    component: ai-apps
    profile: configured
    type: package
    state_model: package
    display_name: Ollama llama3.2
    depends_on:
    - ollama
    provided_by_tool: ollama
    driver:
      kind: ollama-model
      ref: llama3.2
  ollama-model-nomic-embed-text:
    component: ai-apps
    profile: configured
    type: package
    state_model: package
    display_name: Ollama nomic-embed-text
    depends_on:
    - ollama
    provided_by_tool: ollama
    driver:
      kind: ollama-model
      ref: nomic-embed-text
  ollama-model-qwen3-latest:
    component: ai-apps
    profile: configured
    type: package
    state_model: package
    display_name: Ollama qwen3:latest
    depends_on:
    - ollama
    provided_by_tool: ollama
    driver:
      kind: ollama-model
      ref: qwen3:latest
  ollama-model-llama3.1-8b:
    component: ai-apps
    profile: configured
    type: package
    state_model: package
    display_name: Ollama llama3.1:8b
    depends_on:
    - ollama
    provided_by_tool: ollama
    driver:
      kind: ollama-model
      ref: llama3.1:8b
  ollama-model-mistral-7b:
    component: ai-apps
    profile: configured
    type: package
    state_model: package
    display_name: Ollama mistral:7b
    depends_on:
    - ollama
    provided_by_tool: ollama
    driver:
      kind: ollama-model
      ref: mistral:7b
  ollama-model-qwen2.5-coder-32b:
    component: ai-apps
    profile: configured
    type: package
    state_model: package
    display_name: Ollama qwen2.5-coder:32b
    depends_on:
    - ollama
    provided_by_tool: ollama
    driver:
      kind: ollama-model
      ref: qwen2.5-coder:32b
  ollama-model-llama3.1-70b:
    component: ai-apps
    profile: configured
    type: package
    state_model: package
    display_name: Ollama llama3.1:70b
    depends_on:
    - ollama
    provided_by_tool: ollama
    driver:
      kind: ollama-model
      ref: llama3.1:70b
small:
- ollama-model-llama3.2
- ollama-model-nomic-embed-text
medium:
- ollama-model-qwen3-latest
- ollama-model-llama3.1-8b
- ollama-model-mistral-7b
large:
- ollama-model-qwen2.5-coder-32b
- ollama-model-llama3.1-70b
