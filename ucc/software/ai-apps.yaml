component: ai-apps
primary_profile: runtime
libs: ai_apps
runner: run_ai_apps_from_yaml
on_fail: ignore
stack:
  kind: docker-compose
  compose_dir: ".ai-stack"
  compose_file: "docker-compose.yml"
  definition_template: "stack/docker-compose.yml"
  marker: "# ai-stack v2"
  services:
    - open-webui
    - flowise
    - openhands
    - n8n
    - qdrant
targets:
  docker-running:
    component: ai-apps
    profile: runtime
    type: runtime
    depends_on:
      - docker-desktop
    soft_depends_on:
      - gate:docker-daemon
    evidence:
      version: "docker --version 2>/dev/null | awk '{print $3}' | tr -d ','"
      pid: "pgrep -f 'Docker Desktop' 2>/dev/null | head -1"

  ai-stack-compose-file:
    component: ai-apps
    profile: parametric
    type: config
    evidence:
      path: "printf '%s' \"$COMPOSE_FILE\""

  ai-stack-running:
    component: ai-apps
    profile: runtime
    type: runtime
    depends_on:
      - docker-running
      - ai-stack-compose-file
    provided_by_tool: docker-compose
