component: ai-apps
primary_profile: runtime
libs: ai_apps
runner: run_ai_apps_from_yaml
on_fail: ignore
platforms:
  - macos
  - linux
  - wsl
stack:
  kind: docker-compose
  compose_dir: ".ai-stack"
  compose_file: "docker-compose.yml"
  definition_template: "stack/docker-compose.yml"
  marker: "# ai-stack v2"
  services:
    - open-webui
    - flowise
    - openhands
    - n8n
    - qdrant
targets:
  ai-stack-compose-file:
    component: ai-apps
    profile: parametric
    type: config
    evidence:
      path: "printf '%s' \"$COMPOSE_FILE\""

  ai-stack-running:
    component: ai-apps
    profile: runtime
    type: runtime
    depends_on:
      - docker-desktop-runtime
      - ai-stack-compose-file
    provided_by_tool: docker-compose
    runtime_manager: docker-compose
    probe_kind: container-set
    endpoints:
      - name: Open WebUI
        url: http://localhost:3000
      - name: Flowise
        url: http://localhost:3001
      - name: OpenHands
        url: http://localhost:3002
      - name: n8n
        url: http://localhost:5678
      - name: Qdrant
        url: http://localhost:6333
