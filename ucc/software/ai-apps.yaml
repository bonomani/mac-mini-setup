component: ai-apps
primary_profile: runtime
libs: ai_apps ollama_models
runner: run_ai_apps_from_yaml
on_fail: ignore
platforms:
- macos
- linux
- wsl2
preferences:
- name: ollama-model-autopull
  default: none
  options: none|small|medium|large
  rationale: none prevents automatic multi-GB downloads; pull models manually when ready. small=≤3B, medium=≤8B, large=all
- name: ai-apps-image-policy
  default: reuse-local
  options: reuse-local|always-pull
  rationale: reuse-local starts the compose stack from locally available images for faster runs; always-pull refreshes images before stack startup and updates
ollama_installer_url: https://ollama.com/install.sh
brew_service_name: ollama
api_host: 127.0.0.1
api_port: 11434
api_tags_path: /api/tags
log_file: /tmp/ollama.log
fallback_stop_pattern: ollama (serve|app)
fallback_start_cmd: ollama serve
macos_min_version: 14
stack:
  compose_dir: .ai-stack
  compose_file: docker-compose.yml
  definition_template: stack/docker-compose.yml
  marker: '# ai-stack v2'
  services:
  - open-webui
  - flowise
  - openhands
  - n8n
  - qdrant
targets:
  ai-apps-template:
    component: ai-apps
    profile: configured
    type: precondition
    state_model: config
    display_name: Compose template
    driver:
      kind: custom
    oracle:
      configured: ai_apps_template_exists
    evidence:
      template: echo_var "${stack.definition_template}"
  ai-stack-compose-file:
    component: ai-apps
    profile: parametric
    type: config
    display_name: compose file
    depends_on:
    - ai-apps-template
    - docker-available
    driver:
      kind: compose-file
      path_env: COMPOSE_FILE
  ai-stack-compose-running:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: AI stack compose up
    depends_on:
    - docker-available
    - ai-stack-compose-file
    driver:
      kind: compose-apply
      path_env: COMPOSE_FILE
      pull_policy_env: UIC_PREF_AI_APPS_IMAGE_POLICY
  open-webui-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Open WebUI
    depends_on:
    - ai-stack-compose-running
    driver:
      kind: docker-compose-service
      service_name: open-webui
    runtime_manager: docker-compose
    probe_kind: http
    endpoints:
    - name: Open WebUI
      scheme: http
      host: localhost
      port: 3000
  flowise-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Flowise
    depends_on:
    - ai-stack-compose-running
    driver:
      kind: docker-compose-service
      service_name: flowise
    runtime_manager: docker-compose
    probe_kind: http
    endpoints:
    - name: Flowise
      scheme: http
      host: localhost
      port: 3001
  openhands-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: OpenHands
    depends_on:
    - ai-stack-compose-running
    driver:
      kind: docker-compose-service
      service_name: openhands
    runtime_manager: docker-compose
    probe_kind: http
    endpoints:
    - name: OpenHands
      scheme: http
      host: localhost
      port: 3002
  n8n-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: n8n
    depends_on:
    - ai-stack-compose-running
    driver:
      kind: docker-compose-service
      service_name: n8n
    runtime_manager: docker-compose
    probe_kind: http
    endpoints:
    - name: n8n
      scheme: http
      host: localhost
      port: 5678
  qdrant-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Qdrant
    depends_on:
    - ai-stack-compose-running
    driver:
      kind: docker-compose-service
      service_name: qdrant
    runtime_manager: docker-compose
    probe_kind: http
    endpoints:
    - name: Qdrant
      scheme: http
      host: localhost
      port: 6333
      path: /collections
  ollama:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Ollama
    # custom-daemon backend needs an init system to autostart:
    # launchd (macOS) or systemd (Linux/WSL2 with systemd=true).
    # On WSL2 without systemd the daemon can't be started — skip gracefully.
    requires: launchd,systemd
    provided_by_tool: ollama-installer
    driver:
      kind: custom-daemon
      bin: ollama
      process: 'ollama (serve|app)'
      # `open -a Ollama` is idempotent (no error if already running) and
      # handles the case where the daemon is externally managed by Ollama.app
      # Top-level fallback_start_cmd (`ollama serve`) is for non-app installs.
      start_cmd: open -a Ollama
      github_repo: ollama/ollama
      # Ollama.app has its own auto-updater (Squirrel) managed via the app's
      # UI ("Auto-download updates" toggle, stored in
      # ~/Library/Application Support/Ollama/db.sqlite as auto_update_enabled).
      # There's no `ollama update` CLI command. When the upstream check
      # reports a newer version, the framework triggers the update action
      # but can't push the update synchronously — the .app applies it
      # asynchronously. Treat post-update still-outdated as [warn] not [fail].
      self_updating: true
      # Probe the running daemon for its actual version — CLI binary
      # version (e.g. brew-installed 0.20.6) can lag the .app bundle
      # (0.20.5) that's actually serving requests. /api/version returns
      # {"version":"X.Y.Z"}.
      version_probe_path: /api/version
      # Presence of the .app bundle signals a self-updating install
      # (Squirrel). Surfaced in evidence as `install=app` vs `install=cli`.
      install_app_path: /Applications/Ollama.app
      # Squirrel stages downloaded updates here; presence of the zip
      # means "downloaded, restart to apply" (same signal the GUI shows).
      # Surfaced in evidence as `update=pending`. The actual apply lives
      # in `_update_ollama` (lib/ai_apps.sh) since the apply needs the
      # SIGTERM-restart-poll sequence specific to Squirrel's ShipIt.
      pending_update_glob: ~/Library/Caches/ollama/updates/*/Ollama-darwin.zip
    endpoints:
    - name: Ollama API
      scheme: http
      host: ${api_host}
      port: ${api_port}
      path: ${api_tags_path}
      note: ollama pull <model>
    stopped_health: Unavailable
  ollama-model-llama3.2:
    component: ai-apps
    profile: configured
    type: package
    display_name: Ollama llama3.2
    depends_on:
    - ollama
    driver:
      kind: pkg
      backends:
      - ollama: llama3.2
  ollama-model-nomic-embed-text:
    component: ai-apps
    profile: configured
    type: package
    display_name: Ollama nomic-embed-text
    depends_on:
    - ollama
    driver:
      kind: pkg
      backends:
      - ollama: nomic-embed-text
  ollama-model-qwen3-latest:
    component: ai-apps
    profile: configured
    type: package
    display_name: Ollama qwen3:latest
    depends_on:
    - ollama
    driver:
      kind: pkg
      backends:
      - ollama: qwen3:latest
  ollama-model-llama3.1-8b:
    component: ai-apps
    profile: configured
    type: package
    display_name: Ollama llama3.1:8b
    depends_on:
    - ollama
    driver:
      kind: pkg
      backends:
      - ollama: llama3.1:8b
  ollama-model-mistral-7b:
    component: ai-apps
    profile: configured
    type: package
    display_name: Ollama mistral:7b
    depends_on:
    - ollama
    driver:
      kind: pkg
      backends:
      - ollama: mistral:7b
  ollama-model-qwen2.5-coder-32b:
    component: ai-apps
    profile: configured
    type: package
    display_name: Ollama qwen2.5-coder:32b
    depends_on:
    - ollama
    driver:
      kind: pkg
      backends:
      - ollama: qwen2.5-coder:32b
  ollama-model-llama3.1-70b:
    component: ai-apps
    profile: configured
    type: package
    display_name: Ollama llama3.1:70b
    depends_on:
    - ollama
    driver:
      kind: pkg
      backends:
      - ollama: llama3.1:70b
small:
- ollama-model-llama3.2
- ollama-model-nomic-embed-text
medium:
- ollama-model-qwen3-latest
- ollama-model-llama3.1-8b
- ollama-model-mistral-7b
large:
- ollama-model-qwen2.5-coder-32b
- ollama-model-llama3.1-70b
