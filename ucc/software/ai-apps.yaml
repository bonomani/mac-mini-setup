component: ai-apps
primary_profile: runtime
libs: ai_apps
runner: run_ai_apps_from_yaml
on_fail: ignore
platforms:
- macos
- linux
- wsl2
stack:
  compose_dir: .ai-stack
  compose_file: docker-compose.yml
  definition_template: stack/docker-compose.yml
  marker: '# ai-stack v2'
  services:
  - open-webui
  - flowise
  - openhands
  - n8n
  - qdrant
targets:
  ai-stack-compose-file:
    component: ai-apps
    profile: parametric
    type: config
    state_model: parametric
    display_name: compose file
    driver:
      kind: compose-file
    evidence:
      path: printf '%s' "$COMPOSE_FILE"
  open-webui-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Open WebUI
    depends_on:
    - docker-desktop
    - ai-stack-compose-file
    provided_by_tool: docker-compose
    driver:
      kind: custom
      service_name: open-webui
    runtime_manager: docker-compose
    probe_kind: http
    oracle:
      runtime: _ucc_http_probe_endpoint "$CFG_DIR" "$YAML_PATH" "$TARGET_NAME" "Open
        WebUI"
    evidence:
      version: _ai_service_runtime_version '${driver.service_name}'
      digest: _ai_service_runtime_digest '${driver.service_name}'
      ref: _ai_service_runtime_ref '${driver.service_name}'
    endpoints:
    - name: Open WebUI
      scheme: http
      host: localhost
      port: 3000
    actions:
      install: _ai_apply_compose_runtime
  flowise-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Flowise
    depends_on:
    - docker-desktop
    - ai-stack-compose-file
    provided_by_tool: docker-compose
    driver:
      kind: custom
      service_name: flowise
    runtime_manager: docker-compose
    probe_kind: http
    oracle:
      runtime: _ucc_http_probe_endpoint "$CFG_DIR" "$YAML_PATH" "$TARGET_NAME" Flowise
    evidence:
      version: _ai_service_runtime_version '${driver.service_name}'
      digest: _ai_service_runtime_digest '${driver.service_name}'
      ref: _ai_service_runtime_ref '${driver.service_name}'
    endpoints:
    - name: Flowise
      scheme: http
      host: localhost
      port: 3001
    actions:
      install: _ai_apply_compose_runtime
  openhands-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: OpenHands
    depends_on:
    - docker-desktop
    - ai-stack-compose-file
    provided_by_tool: docker-compose
    driver:
      kind: custom
      service_name: openhands
    runtime_manager: docker-compose
    probe_kind: http
    oracle:
      runtime: _ucc_http_probe_endpoint "$CFG_DIR" "$YAML_PATH" "$TARGET_NAME" OpenHands
    evidence:
      version: _ai_service_runtime_version '${driver.service_name}'
      digest: _ai_service_runtime_digest '${driver.service_name}'
      ref: _ai_service_runtime_ref '${driver.service_name}'
    endpoints:
    - name: OpenHands
      scheme: http
      host: localhost
      port: 3002
    actions:
      install: _ai_apply_compose_runtime
  n8n-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: n8n
    depends_on:
    - docker-desktop
    - ai-stack-compose-file
    provided_by_tool: docker-compose
    driver:
      kind: custom
      service_name: n8n
    runtime_manager: docker-compose
    probe_kind: http
    oracle:
      runtime: _ucc_http_probe_endpoint "$CFG_DIR" "$YAML_PATH" "$TARGET_NAME" n8n
    evidence:
      version: _ai_service_runtime_version '${driver.service_name}'
      digest: _ai_service_runtime_digest '${driver.service_name}'
      ref: _ai_service_runtime_ref '${driver.service_name}'
    endpoints:
    - name: n8n
      scheme: http
      host: localhost
      port: 5678
    actions:
      install: _ai_apply_compose_runtime
  qdrant-runtime:
    component: ai-apps
    profile: runtime
    type: runtime
    display_name: Qdrant
    depends_on:
    - docker-desktop
    - ai-stack-compose-file
    provided_by_tool: docker-compose
    driver:
      kind: custom
      service_name: qdrant
    runtime_manager: docker-compose
    probe_kind: http
    oracle:
      runtime: _ucc_http_probe_endpoint "$CFG_DIR" "$YAML_PATH" "$TARGET_NAME" Qdrant
    evidence:
      version: _ai_service_runtime_version '${driver.service_name}'
      digest: _ai_service_runtime_digest '${driver.service_name}'
      ref: _ai_service_runtime_ref '${driver.service_name}'
    endpoints:
    - name: Qdrant
      scheme: http
      host: localhost
      port: 6333
      path: /collections
    actions:
      install: _ai_apply_compose_runtime
