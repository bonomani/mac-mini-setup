component: cli-tools
primary_profile: configured
libs: cli_tools
runner: run_cli_tools_from_yaml
platforms:
- macos
- linux
- wsl2
omz_theme: agnoster
omz_installer_url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
omz_dir: .oh-my-zsh
shell_profile: .zprofile
home_bin_dir: bin
targets:
  git:
    component: cli-tools
    profile: configured
    type: package
    display_name: Git
    driver:
      kind: pkg
      backends:
      - brew: git
      - native-pm: git
      bin: git
  git-global-config:
    component: cli-tools
    profile: configured
    type: config
    display_name: Git global config
    depends_on:
    - git
    driver:
      kind: git-global
  cli-jq:
    component: cli-tools
    profile: configured
    type: package
    display_name: jq
    driver:
      kind: pkg
      backends:
      - brew: jq
      - native-pm: jq
      bin: jq
  cli-wget:
    component: cli-tools
    profile: configured
    type: package
    display_name: wget
    driver:
      kind: pkg
      backends:
      - brew: wget
      - native-pm: wget
      bin: wget
  cli-curl:
    component: cli-tools
    profile: configured
    type: package
    display_name: curl
    driver:
      kind: pkg
      backends:
      - brew: curl
      - native-pm: curl
      bin: curl
  cli-htop:
    component: cli-tools
    profile: configured
    type: package
    display_name: htop
    driver:
      kind: pkg
      backends:
      - brew: htop
      - native-pm: htop
      bin: htop
  cli-btop:
    component: cli-tools
    profile: configured
    type: package
    display_name: btop
    driver:
      kind: pkg
      backends:
      - brew: btop
      - native-pm: btop
      bin: btop
  cli-tmux:
    component: cli-tools
    profile: configured
    type: package
    display_name: tmux
    driver:
      kind: pkg
      backends:
      - brew: tmux
      - native-pm: tmux
      bin: tmux
  cli-fzf:
    component: cli-tools
    profile: configured
    type: package
    display_name: fzf
    driver:
      kind: pkg
      backends:
      - brew: fzf
      - native-pm: fzf
      bin: fzf
  cli-ripgrep:
    component: cli-tools
    profile: configured
    type: package
    display_name: ripgrep
    driver:
      kind: pkg
      backends:
      - brew: ripgrep
      - native-pm: ripgrep
      bin: ripgrep
  cli-fd:
    component: cli-tools
    profile: configured
    type: package
    display_name: fd
    driver:
      kind: pkg
      backends:
      - brew: fd
      - native-pm: fd-find
      bin: fd
  cli-tree:
    component: cli-tools
    profile: configured
    type: package
    display_name: tree
    driver:
      kind: pkg
      backends:
      - brew: tree
      - native-pm: tree
      bin: tree
  cli-uv:
    component: cli-tools
    profile: configured
    type: package
    display_name: uv
    driver:
      kind: pkg
      backends:
      - brew: uv
      - native-pm: uv
      bin: uv
  cli-pnpm:
    component: cli-tools
    profile: configured
    type: package
    display_name: pnpm
    driver:
      kind: pkg
      backends:
      - brew: pnpm
      - native-pm: pnpm
      bin: pnpm
  cli-gcc:
    component: cli-tools
    profile: configured
    type: package
    display_name: GCC
    update_class: lib
    driver:
      kind: pkg
      backends:
      - brew: gcc
      - native-pm: gcc
      bin: gcc
  cli-gh:
    component: cli-tools
    profile: configured
    type: package
    display_name: GitHub CLI
    driver:
      kind: pkg
      backends:
      - brew: gh
      - native-pm: gh
      bin: gh
  cli-llama.cpp:
    component: cli-tools
    profile: configured
    type: package
    display_name: llama.cpp
    driver:
      kind: pkg
      backends:
      - brew: llama.cpp
      - native-pm: llama.cpp
      bin: llama.cpp
  cli-opencode:
    component: cli-tools
    profile: configured
    type: package
    display_name: OpenCode
    driver:
      kind: pkg
      backends:
      - npm: opencode-ai
      - brew: opencode
      bin: opencode
      github_repo: sst/opencode
  cli-pi:
    component: cli-tools
    profile: configured
    type: package
    display_name: Pi Coding Agent
    driver:
      kind: pkg
      backends:
      - npm: '@mariozechner/pi-coding-agent'
      bin: pi
      github_repo: mariozechner/pi
  cli-aria2:
    component: cli-tools
    profile: configured
    type: package
    display_name: aria2
    driver:
      kind: pkg
      backends:
      - brew: aria2
      - native-pm: aria2
      bin: aria2
  cli-cmake:
    component: cli-tools
    profile: configured
    type: package
    display_name: CMake
    driver:
      kind: pkg
      backends:
      - brew: cmake
      - native-pm: cmake
      bin: cmake
  cli-hyperfine:
    component: cli-tools
    profile: configured
    type: package
    display_name: hyperfine
    driver:
      kind: pkg
      backends:
      - brew: hyperfine
      - native-pm: hyperfine
      bin: hyperfine
  cli-just:
    component: cli-tools
    profile: configured
    type: package
    display_name: just
    driver:
      kind: pkg
      backends:
      - brew: just
      - native-pm: just
      bin: just
  cli-watchexec:
    component: cli-tools
    profile: configured
    type: package
    display_name: watchexec
    driver:
      kind: pkg
      backends:
      - brew: watchexec
      - native-pm: watchexec
      bin: watchexec
  cli-z3:
    component: cli-tools
    profile: configured
    type: package
    display_name: Z3 SMT solver
    driver:
      kind: pkg
      backends:
      - brew: z3
      - native-pm: z3
      bin: z3
  cli-coq:
    component: cli-tools
    profile: configured
    type: package
    display_name: Coq proof assistant
    driver:
      kind: pkg
      backends:
      - brew: coq
      - native-pm: coq
      bin: coqc
  cli-mold:
    component: cli-tools
    profile: configured
    type: package
    display_name: mold linker
    driver:
      kind: pkg
      backends:
      - brew: mold
      - native-pm: mold
      bin: mold
  cli-nasm:
    component: cli-tools
    profile: configured
    type: package
    display_name: NASM assembler
    driver:
      kind: pkg
      backends:
      - brew: nasm
      - native-pm: nasm
      bin: nasm
  cli-wabt:
    component: cli-tools
    profile: configured
    type: package
    display_name: WABT (WebAssembly Binary Toolkit)
    driver:
      kind: pkg
      backends:
      - brew: wabt
      - native-pm: wabt
      bin: wat2wasm
  cli-binaryen:
    component: cli-tools
    profile: configured
    type: package
    display_name: Binaryen (wasm-opt)
    driver:
      kind: pkg
      backends:
      - brew: binaryen
      - native-pm: binaryen
      bin: wasm-opt
  cli-b3sum:
    component: cli-tools
    profile: configured
    type: package
    display_name: BLAKE3 (b3sum)
    driver:
      kind: pkg
      backends:
      - brew: b3sum
      - native-pm: b3sum
      bin: b3sum
  cli-skopeo:
    component: cli-tools
    profile: configured
    type: package
    display_name: skopeo
    driver:
      kind: pkg
      backends:
      - brew: skopeo
      - native-pm: skopeo
      bin: skopeo
  cli-pandoc:
    component: cli-tools
    profile: configured
    type: package
    display_name: Pandoc
    driver:
      kind: pkg
      backends:
      - brew: pandoc
      - native-pm: pandoc
      bin: pandoc
  cli-graphviz:
    component: cli-tools
    profile: configured
    type: package
    display_name: Graphviz
    driver:
      kind: pkg
      backends:
      - brew: graphviz
      - native-pm: graphviz
      bin: dot
  nftables:
    component: cli-tools
    profile: configured
    type: package
    display_name: nftables
    requires: linux,wsl2
    driver:
      kind: pkg
      backends:
      - native-pm: nftables
      bin: nft
  firewalld:
    component: cli-tools
    profile: configured
    type: package
    display_name: firewalld
    requires: linux,wsl2
    depends_on:
    - nftables
    driver:
      kind: pkg
      backends:
      - native-pm: firewalld
      bin: firewall-cmd
  oh-my-zsh:
    component: cli-tools
    profile: configured
    type: config
    display_name: Oh My Zsh
    driver:
      kind: script-installer
      install_url: ${omz_installer_url}
      install_dir: ${omz_dir}
      upgrade_script: tools/upgrade.sh
      github_repo: ohmyzsh/ohmyzsh
  omz-theme-agnoster:
    component: cli-tools
    profile: configured
    type: config
    display_name: Agnoster theme
    depends_on:
    - oh-my-zsh
    driver:
      kind: zsh-config
      key: ZSH_THEME
      value: ${omz_theme}
      config_file: .zshrc
  home-bin-in-path:
    component: cli-tools
    profile: configured
    type: config
    display_name: ~/bin in PATH
    driver:
      kind: path-export
      bin_dir: ${home_bin_dir}
      shell_profile: ${shell_profile}
  ai-healthcheck:
    component: cli-tools
    profile: configured
    type: config
    display_name: ai-healthcheck
    depends_on:
    - home-bin-in-path
    driver:
      kind: home-artifact
      subkind: script
      script_name: ai-healthcheck
      bin_dir: ${home_bin_dir}
  iterm2:
    component: cli-tools
    profile: configured
    type: package
    display_name: iTerm2
    requires: macos
    driver:
      kind: pkg
      backends:
      - brew-cask: iterm2
      bin: iterm2
      greedy_auto_updates: 'true'
  lm-studio:
    component: cli-tools
    profile: configured
    type: package
    display_name: LM Studio
    requires: macos
    driver:
      kind: pkg
      backends:
      - brew-cask: lm-studio
      bin: lm-studio
      greedy_auto_updates: 'true'
  vmware-fusion:
    component: cli-tools
    profile: configured
    type: package
    display_name: VMware Fusion
    requires: macos
    driver:
      kind: pkg
      backends:
      - brew-cask: vmware-fusion
      bin: vmrun
      greedy_auto_updates: 'true'
  vmware-workstation:
    component: cli-tools
    profile: configured
    type: package
    display_name: VMware Workstation (Windows host)
    requires: wsl2
    driver:
      kind: pkg
      backends:
      - winget: VMware.WorkstationPro
cli_tools:
- cli-jq
- cli-wget
- cli-curl
- cli-htop
- cli-btop
- cli-tmux
- cli-fzf
- cli-ripgrep
- cli-fd
- cli-tree
- cli-uv
- cli-pnpm
- cli-gcc
- cli-gh
- cli-llama.cpp
- cli-opencode
- cli-aria2
- cli-cmake
- cli-hyperfine
- cli-just
- cli-watchexec
- cli-z3
- cli-coq
- cli-mold
- cli-nasm
- cli-wabt
- cli-binaryen
- cli-b3sum
- cli-skopeo
- cli-pandoc
- cli-graphviz
casks:
- iterm2
- lm-studio
global_config:
- key: init.defaultBranch
  value: main
- key: pull.rebase
  value: 'false'
- key: core.autocrlf
  value: input
