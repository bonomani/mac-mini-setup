component: dev-tools
primary_profile: runtime
libs: python vscode_ext dev_tools git
runner: run_dev_tools_from_yaml
platforms:
- macos
python_version: 3.12.3
node_version: 24
nvm_dir: .nvm
pyenv_dir: .pyenv
omz_theme: agnoster
omz_installer_url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
omz_dir: .oh-my-zsh
vscode_cask_id: visual-studio-code
vscode_app_path: /Applications/Visual Studio Code.app
vscode_cli_path: /Applications/Visual Studio Code.app/Contents/Resources/app/bin/code
vscode_cli_link_relpath: bin/code
vscode_code_cmd_hint: "Symlink created. If 'code' is still missing in new shells,\
  \ run: Cmd+Shift+P > Shell Command: Install code command in PATH"
vscode_settings_relpath: Library/Application Support/Code/User/settings.json
vscode_settings_patch: ucc/software/vscode-settings.json
zsh_config: .zshrc
shell_profile: .zprofile
home_bin_dir: bin
node_formula: node
ariaflow_tap: bonomani/ariaflow
aria2_port: 6800
ariaflow_port: 8000
ariaflow_web_port: 8001
pyenv_packages:
- pyenv
- pyenv-virtualenv
pip_bootstrap:
- pip
- setuptools
- wheel
targets:
  pyenv:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: pyenv
    driver:
      kind: pyenv-brew
  xz:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: XZ Utils
    driver:
      kind: brew
      ref: xz
  python:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Python
    depends_on:
    - xz
    driver:
      kind: pyenv-version
      version: ${python_version}
  pip-latest:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: pip
    driver:
      kind: pip-bootstrap
  vscode:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Visual Studio Code
    soft_depends_on:
    - homebrew
    driver:
      kind: app-bundle
      app_path: /Applications/Visual Studio Code.app
      brew_cask: visual-studio-code
      update_api: https://update.code.visualstudio.com/api/releases/stable
      download_url_tpl: https://update.code.visualstudio.com/{version}/darwin-universal/stable
      package_ext: zip
  vscode-code-cmd:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: VS Code CLI
    depends_on:
    - vscode
    driver:
      kind: cli-symlink
      src_path: ${vscode_cli_path}
      link_relpath: ${vscode_cli_link_relpath}
      cmd: code
      hint: ${vscode_code_cmd_hint}
  vscode-settings:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: VS Code settings
    depends_on:
    - vscode
    driver:
      kind: json-merge
      settings_relpath: ${vscode_settings_relpath}
      patch_relpath: ${vscode_settings_patch}
    evidence:
      path: home_path "${vscode_settings_relpath}"
  nvm:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: nvm
    driver:
      kind: nvm
      nvm_dir: ${nvm_dir}
  node-lts:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Node.js LTS
    driver:
      kind: nvm-version
      version: ${node_version}
      nvm_dir: ${nvm_dir}
  oh-my-zsh:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: Oh My Zsh
    driver:
      kind: script-installer
      install_url: ${omz_installer_url}
      install_dir: ${omz_dir}
      upgrade_script: tools/upgrade.sh
  omz-theme-agnoster:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: Agnoster theme
    depends_on:
    - oh-my-zsh
    driver:
      kind: zsh-config
      key: ZSH_THEME
      value: ${omz_theme}
      config_file: ${zsh_config}
  home-bin-in-path:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: ~/bin in PATH
    driver:
      kind: path-export
      bin_dir: ${home_bin_dir}
      shell_profile: ${shell_profile}
  ai-healthcheck:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: ai-healthcheck
    depends_on:
    - home-bin-in-path
    driver:
      kind: bin-script
      script_name: ai-healthcheck
      bin_dir: ${home_bin_dir}
  ariaflow:
    component: dev-tools
    profile: runtime
    type: runtime
    display_name: Ariaflow
    soft_depends_on:
    - gate:networkquality-available
    driver:
      kind: brew-service
      ref: ariaflow
    endpoints:
    - name: aria2 RPC
      scheme: http
      host: 127.0.0.1
      port: ${aria2_port}
      note: managed by ariaflow
    - name: ariaflow API
      scheme: http
      host: 127.0.0.1
      port: ${ariaflow_port}
      path: /api/status
  ariaflow-web:
    component: dev-tools
    profile: runtime
    type: runtime
    display_name: Ariaflow Web
    depends_on:
    - ariaflow
    driver:
      kind: brew-service
      ref: ariaflow-web
    endpoints:
    - name: ariaflow web UI
      scheme: http
      host: 127.0.0.1
      port: ${ariaflow_web_port}
  cli-jq:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: jq
    driver:
      kind: brew
      ref: jq
  cli-wget:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: wget
    driver:
      kind: brew
      ref: wget
  cli-curl:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: curl
    driver:
      kind: brew
      ref: curl
  cli-htop:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: htop
    driver:
      kind: brew
      ref: htop
  cli-btop:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: btop
    driver:
      kind: brew
      ref: btop
  cli-tmux:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: tmux
    driver:
      kind: brew
      ref: tmux
  cli-fzf:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: fzf
    driver:
      kind: brew
      ref: fzf
  cli-ripgrep:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: ripgrep
    driver:
      kind: brew
      ref: ripgrep
  cli-fd:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: fd
    driver:
      kind: brew
      ref: fd
  cli-tree:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: tree
    driver:
      kind: brew
      ref: tree
  cli-uv:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: uv
    driver:
      kind: brew
      ref: uv
  cli-pnpm:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: pnpm
    driver:
      kind: brew
      ref: pnpm
  cli-gcc:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: GCC
    driver:
      kind: brew
      ref: gcc
  cli-gh:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: GitHub CLI
    driver:
      kind: brew
      ref: gh
  cli-llama.cpp:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: llama.cpp
    driver:
      kind: brew
      ref: llama.cpp
  cli-opencode:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: OpenCode
    driver:
      kind: brew
      ref: opencode
  cli-aria2:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: aria2
    driver:
      kind: brew
      ref: aria2
  cli-cmake:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: CMake
    driver:
      kind: brew
      ref: cmake
  vscode-ext-ms-python.python:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: VS Code Python
    driver:
      kind: vscode-marketplace
      extension_id: ms-python.python
  vscode-ext-ms-python.vscode-pylance:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: VS Code Pylance
    driver:
      kind: vscode-marketplace
      extension_id: ms-python.vscode-pylance
  vscode-ext-ms-toolsai.jupyter:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: VS Code Jupyter
    driver:
      kind: vscode-marketplace
      extension_id: ms-toolsai.jupyter
  vscode-ext-ms-vscode.cpptools:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: VS Code C/C++
    driver:
      kind: vscode-marketplace
      extension_id: ms-vscode.cpptools
  vscode-ext-continue.continue:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: VS Code Continue
    driver:
      kind: vscode-marketplace
      extension_id: continue.continue
  vscode-ext-eamodio.gitlens:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: VS Code GitLens
    driver:
      kind: vscode-marketplace
      extension_id: eamodio.gitlens
  vscode-ext-ms-vscode-remote.remote-containers:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: VS Code Dev Containers
    driver:
      kind: vscode-marketplace
      extension_id: ms-vscode-remote.remote-containers
  iterm2:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: iTerm2
    provided_by_tool: brew-cask
    driver:
      kind: brew
      cask: true
      ref: iterm2
      greedy_auto_updates: true
  lm-studio:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: LM Studio
    provided_by_tool: brew-cask
    driver:
      kind: brew
      cask: true
      ref: lm-studio
      greedy_auto_updates: true
  npm-global-@openai/codex:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Codex CLI
    driver:
      kind: npm-global
      package: '@openai/codex'
  npm-global-@anthropic-ai/claude-code:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Claude Code CLI
    driver:
      kind: npm-global
      package: '@anthropic-ai/claude-code'
  npm-global-bmad-method:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: BMAD Method CLI
    driver:
      kind: npm-global
      package: bmad-method
  brew-node-unlinked:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: Brew node unlinked
    depends_on:
    - node-lts
    driver:
      kind: brew-unlink
      formula: ${node_formula}
  git:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Git
    driver:
      kind: brew
      ref: git
  git-global-config:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: Git global config
    depends_on:
    - git
    driver:
      kind: git-global
cli_tools:
- cli-jq
- cli-wget
- cli-curl
- cli-htop
- cli-btop
- cli-tmux
- cli-fzf
- cli-ripgrep
- cli-fd
- cli-tree
- cli-uv
- cli-pnpm
- cli-gcc
- cli-gh
- cli-llama.cpp
- cli-opencode
- cli-aria2
- cli-cmake
vscode_extensions:
- vscode-ext-ms-python.python
- vscode-ext-ms-python.vscode-pylance
- vscode-ext-ms-toolsai.jupyter
- vscode-ext-ms-vscode.cpptools
- vscode-ext-continue.continue
- vscode-ext-eamodio.gitlens
- vscode-ext-ms-vscode-remote.remote-containers
npm_packages:
- npm-global-@openai/codex
- npm-global-@anthropic-ai/claude-code
- npm-global-bmad-method
casks:
- iterm2
- lm-studio
global_config:
- key: init.defaultBranch
  value: main
- key: pull.rebase
  value: 'false'
- key: core.autocrlf
  value: input
