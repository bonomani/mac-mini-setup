    provided_by_tool: vscode-marketplace
    extension_id: ms-python.python
    observe_cmd: |
      ver="$(code --list-extensions --show-versions 2>/dev/null | awk -F@ 'tolower($1)==tolower("${extension_id}") {print $2; exit}')"
      printf '%s' "${ver:-absent}"
    evidence:
      version: "code --list-extensions --show-versions 2>/dev/null | awk -F@ 'tolower($1)==tolower(\"${extension_id}\") {print $2; exit}'"
    install_cmd: "ucc_run code --install-extension '${extension_id}' --force"

