    runtime_manager: brew-service
    probe_kind: http
    oracle:
      configured: ariaflow-web --version >/dev/null 2>&1
      runtime: curl -fsS --max-time 5 "http://127.0.0.1:${ariaflow_web_port}" >/dev/null
