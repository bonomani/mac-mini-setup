component: dev-tools
primary_profile: runtime
libs: python vscode_ext dev_tools
runner: run_dev_tools_from_yaml
platforms:
- macos
python_version: 3.12.3
node_version: 24
nvm_dir: .nvm
pyenv_dir: .pyenv
omz_theme: agnoster
omz_installer_url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
omz_dir: .oh-my-zsh
vscode_cask_id: visual-studio-code
vscode_app_path: /Applications/Visual Studio Code.app
vscode_cli_path: /Applications/Visual Studio Code.app/Contents/Resources/app/bin/code
vscode_cli_link_relpath: bin/code
vscode_code_cmd_hint: "Symlink created. If 'code' is still missing in new shells,\
  \ run: Cmd+Shift+P > Shell Command: Install code command in PATH"
vscode_settings_relpath: Library/Application Support/Code/User/settings.json
vscode_settings_patch: ucc/software/vscode-settings.json
zsh_config: .zshrc
shell_profile: .zprofile
home_bin_dir: bin
node_formula: node
ariaflow_tap: bonomani/ariaflow
aria2_port: 6800
ariaflow_port: 8000
ariaflow_web_port: 8001
pyenv_packages:
- pyenv
- pyenv-virtualenv
pip_bootstrap:
- pip
- setuptools
- wheel
targets:
  pyenv:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: pyenv
    depends_on:
    - homebrew
    provided_by_tool: brew
    driver:
      kind: custom
    observe_cmd: brew_observe pyenv
    evidence:
      version: pyenv_version
      root: pyenv_root
    actions:
      install: _pyenv_install "${zsh_config}"
      update: _pyenv_upgrade
  xz:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: XZ Utils
    depends_on:
    - homebrew
    provided_by_tool: brew
    driver:
      kind: brew
      ref: xz
  python:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Python
    depends_on:
    - pyenv
    - xz
    provided_by_tool: pyenv
    driver:
      kind: pyenv-version
      version: ${python_version}
  pip-latest:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: pip
    depends_on:
    - python
    driver:
      kind: custom
    oracle:
      configured: is_installed pip
    evidence:
      version: pip_version
      path: bin_path pip
    actions:
      install: _pip_bootstrap_install
  vscode:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Visual Studio Code
    soft_depends_on:
    - homebrew
    provided_by_tool: brew-cask
    driver:
      kind: app-bundle
      app_path: /Applications/Visual Studio Code.app
      brew_cask: visual-studio-code
      update_api: https://update.code.visualstudio.com/api/releases/stable
      download_url_tpl: https://update.code.visualstudio.com/{version}/darwin-universal/stable
      package_ext: zip
  vscode-code-cmd:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: VS Code CLI
    depends_on:
    - vscode
    driver:
      kind: custom
    oracle:
      configured: is_installed code
    evidence:
      version: code_version
      path: bin_path code
    actions:
      install: _install_cli_symlink "${vscode_cli_path}" "${vscode_cli_link_relpath}"
        "${vscode_code_cmd_hint}"
  vscode-settings:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: VS Code settings
    depends_on:
    - vscode
    driver:
      kind: json-merge
      settings_relpath: ${vscode_settings_relpath}
      patch_relpath: ${vscode_settings_patch}
    evidence:
      path: home_path "${vscode_settings_relpath}"
  nvm:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: nvm
    depends_on:
    - homebrew
    provided_by_tool: nvm-installer
    driver:
      kind: nvm
      nvm_dir: ${nvm_dir}
  node-lts:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Node.js LTS
    depends_on:
    - nvm
    provided_by_tool: nvm
    driver:
      kind: nvm-version
      version: ${node_version}
      nvm_dir: ${nvm_dir}
  oh-my-zsh:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: Oh My Zsh
    driver:
      kind: custom
    oracle:
      configured: home_dir_exists "${omz_dir}"
    evidence:
      version: omz_version
      folder: home_path "${omz_dir}"
    actions:
      install: _omz_install
      update: _omz_upgrade
  omz-theme-agnoster:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: Agnoster theme
    depends_on:
    - oh-my-zsh
    driver:
      kind: custom
    oracle:
      configured: _zsh_theme_is_set "${omz_theme}" "${zsh_config}"
    evidence:
      theme: echo_var "${omz_theme}"
      file: home_path "${zsh_config}"
    actions:
      install: _zsh_set_theme "${omz_theme}" "${zsh_config}"
  home-bin-in-path:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: ~/bin in PATH
    driver:
      kind: custom
    oracle:
      configured: _path_dir_in_profile "${home_bin_dir}" "${shell_profile}"
    evidence:
      path: home_path "${home_bin_dir}"
    actions:
      install: _path_dir_add_to_profile "${home_bin_dir}" "${shell_profile}"
  ai-healthcheck:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: ai-healthcheck
    depends_on:
    - home-bin-in-path
    driver:
      kind: custom
    oracle:
      configured: home_file_is_executable "${home_bin_dir}/ai-healthcheck"
    evidence:
      version: script_md5 "${home_bin_dir}/ai-healthcheck"
      path: home_path "${home_bin_dir}/ai-healthcheck"
    actions:
      install: _install_bin_script ai-healthcheck "${home_bin_dir}"
  ariaflow:
    component: dev-tools
    profile: runtime
    type: runtime
    display_name: Ariaflow
    depends_on:
    - homebrew
    soft_depends_on:
    - gate:networkquality-available
    provided_by_tool: brew
    driver:
      kind: brew-service
      ref: ariaflow
    endpoints:
    - name: aria2 RPC
      scheme: http
      host: 127.0.0.1
      port: ${aria2_port}
      note: managed by ariaflow
    - name: ariaflow API
      scheme: http
      host: 127.0.0.1
      port: ${ariaflow_port}
      path: /api/status
  ariaflow-web:
    component: dev-tools
    profile: runtime
    type: runtime
    display_name: Ariaflow Web
    depends_on:
    - ariaflow
    provided_by_tool: brew
    driver:
      kind: brew-service
      ref: ariaflow-web
    endpoints:
    - name: ariaflow web UI
      scheme: http
      host: 127.0.0.1
      port: ${ariaflow_web_port}
  cli-jq:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: jq
    depends_on:
    - homebrew
    provided_by_tool: brew
    driver:
      kind: brew
      ref: jq
  cli-wget:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
