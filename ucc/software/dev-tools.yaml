component: dev-tools
primary_profile: runtime
libs: vscode_ext dev_tools
runner: run_dev_tools_from_yaml
platforms:
- macos
node_version: 24
node_previous_version: 20
omz_theme: agnoster
omz_installer_url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
vscode_cask_id: visual-studio-code
vscode_app_path: /Applications/Visual Studio Code.app
vscode_cli_path: /Applications/Visual Studio Code.app/Contents/Resources/app/bin/code
vscode_cli_link_path: /usr/local/bin/code
vscode_settings_relpath: Library/Application Support/Code/User/settings.json
vscode_settings_patch: ucc/software/vscode-settings.json
ariaflow_tap: bonomani/ariaflow
aria2_port: 6800
ariaflow_port: 8000
ariaflow_web_port: 8001
targets:
  vscode:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Visual Studio Code
    depends_on:
    - homebrew
    provided_by_tool: brew-cask
    package_driver: brew-cask
    observe_cmd: "if [[ -d \"${vscode_app_path}\" ]] && ! brew_cask_is_installed \"\
      ${vscode_cask_id}\"; then\n  defaults read \"${vscode_app_path}/Contents/Info\"\
      \ CFBundleShortVersionString 2>/dev/null || printf 'present'\nelse\n  brew_cask_observe\
      \ \"${vscode_cask_id}\"\nfi\n"
    evidence:
      version: defaults read "${vscode_app_path}/Contents/Info" CFBundleShortVersionString
        2>/dev/null || true
    install_cmd: brew_cask_install '${vscode_cask_id}'
    update_cmd: brew_cask_upgrade '${vscode_cask_id}'
  vscode-code-cmd:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: VS Code CLI
    config_driver: symlink-command
    depends_on:
    - vscode
    oracle:
      configured: code --version >/dev/null 2>&1
    evidence:
      path: command -v code 2>/dev/null || true
    install_cmd: "if [[ -x \"${vscode_cli_path}\" ]]; then\n  sudo mkdir -p \"$(dirname\
      \ \"${vscode_cli_link_path}\")\"\n  sudo ln -sf \"${vscode_cli_path}\" \"${vscode_cli_link_path}\"\
      \n  export PATH=\"$(dirname \"${vscode_cli_link_path}\"):$PATH\"\n  log_warn\
      \ \"Symlink created. If 'code' is still missing in new shells, run: Cmd+Shift+P\
      \ \u2192 'Shell Command: Install code command in PATH'\"\nelse\n  log_warn \"\
      VS Code binary not found. Open VS Code manually first.\"\n  return 1\nfi\n"
  vscode-settings:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: VS Code settings
    config_driver: json-merge
    depends_on:
    - vscode
    oracle:
      configured: "python3 - \"$HOME/${vscode_settings_relpath}\" \"$CFG_DIR/${vscode_settings_patch}\"\
        \ <<'PY'\nimport json\nimport sys\nfrom pathlib import Path\n\nsettings_path\
        \ = Path(sys.argv[1])\npatch_path = Path(sys.argv[2])\n\ntry:\n    settings\
        \ = json.loads(settings_path.read_text())\n    patch = json.loads(patch_path.read_text())\n\
        except Exception:\n    raise SystemExit(1)\n\nif not isinstance(settings,\
        \ dict) or not isinstance(patch, dict):\n    raise SystemExit(1)\n\nfor key,\
        \ value in patch.items():\n    if settings.get(key) != value:\n        raise\
        \ SystemExit(1)\n\nraise SystemExit(0)\nPY\n"
    evidence:
      path: printf '%s' "$HOME/${vscode_settings_relpath}"
    install_cmd: "mkdir -p \"$(dirname \"$HOME/${vscode_settings_relpath}\")\"\ntmp=\"\
      $(mktemp)\"\npython3 - \"$HOME/${vscode_settings_relpath}\" \"$CFG_DIR/${vscode_settings_patch}\"\
      \ \"$tmp\" <<'PY'\nimport json\nimport sys\nfrom pathlib import Path\n\nsettings_path\
      \ = Path(sys.argv[1])\npatch_path = Path(sys.argv[2])\ntmp_path = Path(sys.argv[3])\n\
      \npatch = json.loads(patch_path.read_text())\nif not isinstance(patch, dict):\n\
      \    raise SystemExit(1)\n\nif settings_path.exists():\n    try:\n        settings\
      \ = json.loads(settings_path.read_text())\n    except Exception:\n        settings\
      \ = {}\nelse:\n    settings = {}\n\nif not isinstance(settings, dict):\n   \
      \ settings = {}\n\nsettings.update(patch)\ntmp_path.write_text(json.dumps(settings,\
      \ indent=2, sort_keys=True) + \"\\n\")\nPY\nmv \"$tmp\" \"$HOME/${vscode_settings_relpath}\"\
      \n"
    update_cmd: "mkdir -p \"$(dirname \"$HOME/${vscode_settings_relpath}\")\"\ntmp=\"\
      $(mktemp)\"\npython3 - \"$HOME/${vscode_settings_relpath}\" \"$CFG_DIR/${vscode_settings_patch}\"\
      \ \"$tmp\" <<'PY'\nimport json\nimport sys\nfrom pathlib import Path\n\nsettings_path\
      \ = Path(sys.argv[1])\npatch_path = Path(sys.argv[2])\ntmp_path = Path(sys.argv[3])\n\
      \npatch = json.loads(patch_path.read_text())\nif not isinstance(patch, dict):\n\
      \    raise SystemExit(1)\n\nif settings_path.exists():\n    try:\n        settings\
      \ = json.loads(settings_path.read_text())\n    except Exception:\n        settings\
      \ = {}\nelse:\n    settings = {}\n\nif not isinstance(settings, dict):\n   \
      \ settings = {}\n\nsettings.update(patch)\ntmp_path.write_text(json.dumps(settings,\
      \ indent=2, sort_keys=True) + \"\\n\")\nPY\nmv \"$tmp\" \"$HOME/${vscode_settings_relpath}\"\
      \n"
  node-lts:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Node.js LTS
    depends_on:
    - homebrew
    provided_by_tool: brew
    package_driver: brew-formula
    observe_cmd: "ver=\"$(node --version 2>/dev/null)\"\nif [[ \"$ver\" != v${node_version}.*\
      \ ]]; then\n  printf 'absent'\nelif [[ \"${UIC_PREF_PACKAGE_UPDATE_POLICY:-always-upgrade}\"\
      \ == \"always-upgrade\" ]] && _brew_is_outdated \"node@${node_version}\"; then\n\
      \  printf 'outdated'\nelse\n  printf '%s' \"${ver#v}\"\nfi\n"
    evidence:
      version: node --version 2>/dev/null | sed 's/^v//'
      path: command -v node 2>/dev/null || true
    install_cmd: 'brew unlink "node@${node_previous_version}" 2>/dev/null || true

      ucc_run brew install "node@${node_version}" && ucc_run brew link --overwrite
      --force "node@${node_version}"

      '
    update_cmd: 'ucc_run brew upgrade "node@${node_version}" && ucc_run brew link
      --overwrite --force "node@${node_version}"

      '
  oh-my-zsh:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: Oh My Zsh
    config_driver: shell-bootstrap
    oracle:
      configured: '[[ -d "$HOME/.oh-my-zsh" ]]'
    evidence:
      folder: printf '%s' "$HOME/.oh-my-zsh"
    install_cmd: 'sh -c "$(curl -fsSL "${omz_installer_url}")" "" --unattended

      '
    update_cmd: '[[ -f "$HOME/.oh-my-zsh/tools/upgrade.sh" ]] && bash "$HOME/.oh-my-zsh/tools/upgrade.sh"
      || true

      '
  omz-theme-agnoster:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: Agnoster theme
    config_driver: shell-file-edit
    depends_on:
    - oh-my-zsh
    oracle:
      configured: grep -q "^ZSH_THEME=\"${omz_theme}\"" "$HOME/.zshrc" 2>/dev/null
    evidence:
      theme: printf '%s' '${omz_theme}'
      file: printf '%s' "$HOME/.zshrc"
    install_cmd: "if grep -q '^ZSH_THEME=' \"$HOME/.zshrc\" 2>/dev/null; then\n  sed\
      \ -i '' \"s/^ZSH_THEME=.*/ZSH_THEME=\\\"${omz_theme}\\\"/\" \"$HOME/.zshrc\"\
      \nelse\n  printf '\\nZSH_THEME=\"%s\"\\n' \"${omz_theme}\" >> \"$HOME/.zshrc\"\
      \nfi\n"
  home-bin-in-path:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: ~/bin in PATH
    config_driver: path-export
    oracle:
      configured: grep -q 'export PATH="$HOME/bin:$PATH"' "$HOME/.zprofile" 2>/dev/null
    evidence:
      path: printf '%s' "$HOME/bin"
    install_cmd: 'mkdir -p "$HOME/bin"

      printf ''\nexport PATH="$HOME/bin:$PATH"\n'' >> "$HOME/.zprofile"

      export PATH="$HOME/bin:$PATH"

      '
  ai-healthcheck:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: ai-healthcheck
    config_driver: script-install
    depends_on:
    - home-bin-in-path
    oracle:
      configured: '[[ -x "$HOME/bin/ai-healthcheck" ]]'
    evidence:
      path: printf '%s' "$HOME/bin/ai-healthcheck"
    install_cmd: 'mkdir -p "$HOME/bin"

      install -m 755 "$CFG_DIR/scripts/ai-healthcheck" "$HOME/bin/ai-healthcheck"

      '
  networkquality-available:
    component: dev-tools
    profile: capability
    type: capability
    display_name: networkQuality
    runtime_manager: capability
    probe_kind: command
    oracle:
      runtime: command -v networkQuality >/dev/null 2>&1
    evidence:
      path: command -v networkQuality 2>/dev/null
  ariaflow:
    component: dev-tools
    profile: runtime
    type: runtime
    display_name: Ariaflow
    depends_on:
    - homebrew
    soft_depends_on:
    - networkquality-available
    provided_by_tool: brew
    runtime_manager: brew-service
    probe_kind: http
    oracle:
      configured: ariaflow --version >/dev/null 2>&1
      runtime: curl -fsS --max-time 5 "http://127.0.0.1:${ariaflow_port}/api/status"
        >/dev/null 2>&1
    evidence:
      version: _brew_cached_version ariaflow
      pid: lsof -ti tcp:${ariaflow_port} 2>/dev/null | head -1
      listener: printf 'tcp:127.0.0.1:${ariaflow_port}'
    endpoints:
    - name: aria2 RPC
      url: http://127.0.0.1:${aria2_port}
      note: managed by ariaflow
    - name: ariaflow API
      url: http://127.0.0.1:${ariaflow_port}
  ariaflow-web:
