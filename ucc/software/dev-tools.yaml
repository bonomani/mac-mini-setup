component: dev-tools
primary_profile: runtime
libs: vscode_ext dev_tools
runner: run_dev_tools_from_yaml
platforms:
  - macos
node_version: 24
node_previous_version: 20
omz_theme: agnoster
omz_installer_url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
vscode_cask_id: visual-studio-code
vscode_app_path: /Applications/Visual Studio Code.app
vscode_cli_path: /Applications/Visual Studio Code.app/Contents/Resources/app/bin/code
vscode_cli_link_path: /usr/local/bin/code
vscode_settings_relpath: Library/Application Support/Code/User/settings.json
vscode_settings_patch: ucc/software/vscode-settings.json
ariaflow_tap: bonomani/ariaflow
aria2_port: 6800
ariaflow_port: 8000
ariaflow_web_port: 8001
targets:
  vscode:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    depends_on:
      - homebrew
    provided_by_tool: brew-cask
    oracle:
      configured: '[[ -d "${vscode_app_path}" ]] || is_installed code'

  vscode-code-cmd:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    depends_on:
      - vscode
    oracle:
      configured: "code --version >/dev/null 2>&1"
    evidence:
      path: "command -v code 2>/dev/null || true"
    install_cmd: |
      if [[ -x "${vscode_cli_path}" ]]; then
        sudo mkdir -p "$(dirname "${vscode_cli_link_path}")"
        sudo ln -sf "${vscode_cli_path}" "${vscode_cli_link_path}"
        export PATH="$(dirname "${vscode_cli_link_path}"):$PATH"
        log_warn "Symlink created. If 'code' is still missing in new shells, run: Cmd+Shift+P → 'Shell Command: Install code command in PATH'"
      else
        log_warn "VS Code binary not found. Open VS Code manually first."
        return 1
      fi

  vscode-settings:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    depends_on:
      - vscode

  node-lts:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    depends_on:
      - homebrew
    provided_by_tool: brew
    oracle:
      configured: 'node --version 2>/dev/null | grep -q "^v${node_version}\."'

  oh-my-zsh:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    oracle:
      configured: '[[ -d "$HOME/.oh-my-zsh" ]]'
    evidence:
      folder: "printf '%s' \"$HOME/.oh-my-zsh\""
    install_cmd: |
      sh -c "$(curl -fsSL "${omz_installer_url}")" "" --unattended
    update_cmd: |
      [[ -f "$HOME/.oh-my-zsh/tools/upgrade.sh" ]] && bash "$HOME/.oh-my-zsh/tools/upgrade.sh" || true

  omz-theme-agnoster:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    depends_on:
      - oh-my-zsh
    oracle:
      configured: 'grep -q "^ZSH_THEME=\"${omz_theme}\"" "$HOME/.zshrc" 2>/dev/null'
    evidence:
      theme: "printf '%s' '${omz_theme}'"
      file: "printf '%s' \"$HOME/.zshrc\""
    install_cmd: |
      if grep -q '^ZSH_THEME=' "$HOME/.zshrc" 2>/dev/null; then
        sed -i '' "s/^ZSH_THEME=.*/ZSH_THEME=\"${omz_theme}\"/" "$HOME/.zshrc"
      else
        printf '\nZSH_THEME="%s"\n' "${omz_theme}" >> "$HOME/.zshrc"
      fi

  home-bin-in-path:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    oracle:
      configured: "grep -q 'export PATH=\"$HOME/bin:$PATH\"' \"$HOME/.zprofile\" 2>/dev/null"
    evidence:
      path: "printf '%s' \"$HOME/bin\""
    install_cmd: |
      mkdir -p "$HOME/bin"
      printf '\nexport PATH="$HOME/bin:$PATH"\n' >> "$HOME/.zprofile"
      export PATH="$HOME/bin:$PATH"

  ai-healthcheck:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    depends_on:
      - home-bin-in-path
    oracle:
      configured: '[[ -x "$HOME/bin/ai-healthcheck" ]]'
    evidence:
      path: "printf '%s' \"$HOME/bin/ai-healthcheck\""
    install_cmd: |
      mkdir -p "$HOME/bin"
      install -m 755 "$CFG_DIR/scripts/ai-healthcheck" "$HOME/bin/ai-healthcheck"

  networkquality-available:
    component: dev-tools
    profile: capability
    type: capability
    display_name: networkQuality
    runtime_manager: capability
    probe_kind: command
    oracle:
      runtime: "command -v networkQuality >/dev/null 2>&1"
    evidence:
      path: "command -v networkQuality 2>/dev/null"

  ariaflow:
    component: dev-tools
    profile: runtime
    type: runtime
    depends_on:
      - homebrew
    soft_depends_on:
      - networkquality-available
    provided_by_tool: brew
    runtime_manager: brew-service
    probe_kind: http
    oracle:
      configured: "ariaflow --version >/dev/null 2>&1"
      runtime: 'curl -fsS --max-time 5 "http://127.0.0.1:${ariaflow_port}/api/status" >/dev/null 2>&1'
    evidence:
      version: "_brew_cached_version ariaflow"
      pid: "lsof -ti tcp:${ariaflow_port} 2>/dev/null | head -1"
      listener: "printf 'tcp:127.0.0.1:${ariaflow_port}'"
    endpoints:
      - name: aria2 RPC
        url: http://127.0.0.1:${aria2_port}
        note: managed by ariaflow
      - name: ariaflow API
        url: http://127.0.0.1:${ariaflow_port}

  ariaflow-web:
    component: dev-tools
    profile: runtime
    type: runtime
    depends_on:
      - ariaflow
    provided_by_tool: brew
    runtime_manager: brew-service
    probe_kind: http
    oracle:
      configured: "ariaflow-web --version >/dev/null 2>&1"
      runtime: 'curl -fsS --max-time 5 "http://127.0.0.1:${ariaflow_web_port}" >/dev/null 2>&1'
    evidence:
      version: "_brew_cached_version ariaflow-web"
      pid: "lsof -ti tcp:${ariaflow_web_port} 2>/dev/null | head -1"
      listener: "printf 'tcp:127.0.0.1:${ariaflow_web_port}'"
    endpoints:
      - name: ariaflow web UI
        url: http://127.0.0.1:${ariaflow_web_port}

  cli-jq:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
