component: dev-tools
primary_profile: runtime
libs: python vscode_ext dev_tools
runner: run_dev_tools_from_yaml
platforms:
- macos
python_version: 3.12.3
node_version: 24
node_previous_version: 20
omz_theme: agnoster
omz_installer_url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
vscode_cask_id: visual-studio-code
vscode_app_path: /Applications/Visual Studio Code.app
vscode_cli_path: /Applications/Visual Studio Code.app/Contents/Resources/app/bin/code
vscode_cli_link_relpath: bin/code
vscode_settings_relpath: Library/Application Support/Code/User/settings.json
vscode_settings_patch: ucc/software/vscode-settings.json
ariaflow_tap: bonomani/ariaflow
aria2_port: 6800
ariaflow_port: 8000
ariaflow_web_port: 8001
pyenv_packages:
- pyenv
- pyenv-virtualenv
pip_bootstrap:
- pip
- setuptools
- wheel
targets:
  pyenv:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: pyenv
    depends_on:
    - homebrew
    provided_by_tool: brew
    driver:
      kind: custom
    observe_cmd: brew_observe pyenv
    evidence:
      version: pyenv --version 2>/dev/null | awk '{print $2}'
      root: pyenv root 2>/dev/null || true
    actions:
      install: 'pkgs="$(python3 "$CFG_DIR/tools/read_config.py" --list "$YAML_PATH"
        pyenv_packages 2>/dev/null | xargs)"

        [[ -n "$pkgs" ]] || pkgs="pyenv pyenv-virtualenv"

        brew_install $pkgs

        grep -q ''pyenv init'' "$HOME/.zshrc" 2>/dev/null || cat "$CFG_DIR/scripts/pyenv-zshrc-snippet"
        >> "$HOME/.zshrc"

        '
      update: 'pkgs="$(python3 "$CFG_DIR/tools/read_config.py" --list "$YAML_PATH"
        pyenv_packages 2>/dev/null | xargs)"

        [[ -n "$pkgs" ]] || pkgs="pyenv pyenv-virtualenv"

        brew_upgrade $pkgs

        '
  xz:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: XZ Utils
    depends_on:
    - homebrew
    provided_by_tool: brew
    driver:
      kind: brew
      ref: xz
  python:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Python
    depends_on:
    - pyenv
    - xz
    provided_by_tool: pyenv
    driver:
      kind: pyenv-version
      version: ${python_version}
  pip-latest:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: pip
    depends_on:
    - python
    driver:
      kind: custom
    oracle:
      configured: pip --version >/dev/null 2>&1
    evidence:
      version: pip --version 2>/dev/null | awk '{print $2}'
      path: command -v pip 2>/dev/null || true
    actions:
      install: 'local pkgs

        pkgs="$(python3 "$CFG_DIR/tools/read_config.py" --list "$YAML_PATH" pip_bootstrap
        2>/dev/null | xargs)"

        [[ -n "$pkgs" ]] && pip install --upgrade $pkgs

        '
  vscode:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Visual Studio Code
    soft_depends_on:
    - homebrew
    provided_by_tool: brew-cask
    driver:
      kind: app-bundle
      app_path: /Applications/Visual Studio Code.app
      brew_cask: visual-studio-code
      update_api: https://update.code.visualstudio.com/api/releases/stable
      download_url_tpl: https://update.code.visualstudio.com/{version}/darwin-universal/stable
      package_ext: zip
  vscode-code-cmd:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: VS Code CLI
    depends_on:
    - vscode
    driver:
      kind: custom
    oracle:
      configured: code --version >/dev/null 2>&1
    evidence:
      path: command -v code 2>/dev/null || true
    actions:
      install: "if [[ -x \"${vscode_cli_path}\" ]]; then\n  mkdir -p \"$(dirname \"\
        $HOME/${vscode_cli_link_relpath}\")\"\n  ln -sf \"${vscode_cli_path}\" \"\
        $HOME/${vscode_cli_link_relpath}\"\n  export PATH=\"$(dirname \"$HOME/${vscode_cli_link_relpath}\"\
        ):$PATH\"\n  log_warn \"Symlink created. If 'code' is still missing in new\
        \ shells, run: Cmd+Shift+P \u2192 'Shell Command: Install code command in\
        \ PATH'\"\nelse\n  log_warn \"VS Code binary not found. Open VS Code manually\
        \ first.\"\n  return 1\nfi\n"
  vscode-settings:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: VS Code settings
    depends_on:
    - vscode
    driver:
      kind: json-merge
      settings_relpath: ${vscode_settings_relpath}
      patch_relpath: ${vscode_settings_patch}
    evidence:
      path: printf '%s' "$HOME/${vscode_settings_relpath}"
  node-lts:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: Node.js LTS
    depends_on:
    - homebrew
    provided_by_tool: brew
    driver:
      kind: brew
      ref: node@${node_version}
      previous_ref: node@${node_previous_version}
  oh-my-zsh:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: Oh My Zsh
    driver:
      kind: custom
    oracle:
      configured: '[[ -d "$HOME/.oh-my-zsh" ]]'
    evidence:
      folder: printf '%s' "$HOME/.oh-my-zsh"
    actions:
      install: 'sh -c "$(curl -fsSL "${omz_installer_url}")" "" --unattended

        '
      update: '[[ -f "$HOME/.oh-my-zsh/tools/upgrade.sh" ]] && bash "$HOME/.oh-my-zsh/tools/upgrade.sh"
        || true

        '
  omz-theme-agnoster:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: Agnoster theme
    depends_on:
    - oh-my-zsh
    driver:
      kind: custom
    oracle:
      configured: grep -q "^ZSH_THEME=\"${omz_theme}\"" "$HOME/.zshrc" 2>/dev/null
    evidence:
      theme: printf '%s' '${omz_theme}'
      file: printf '%s' "$HOME/.zshrc"
    actions:
      install: "if grep -q '^ZSH_THEME=' \"$HOME/.zshrc\" 2>/dev/null; then\n  sed\
        \ -i '' \"s/^ZSH_THEME=.*/ZSH_THEME=\\\"${omz_theme}\\\"/\" \"$HOME/.zshrc\"\
        \nelse\n  printf '\\nZSH_THEME=\"%s\"\\n' \"${omz_theme}\" >> \"$HOME/.zshrc\"\
        \nfi\n"
  home-bin-in-path:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: ~/bin in PATH
    driver:
      kind: custom
    oracle:
      configured: grep -q 'export PATH="$HOME/bin:$PATH"' "$HOME/.zprofile" 2>/dev/null
    evidence:
      path: printf '%s' "$HOME/bin"
    actions:
      install: 'mkdir -p "$HOME/bin"

        printf ''\nexport PATH="$HOME/bin:$PATH"\n'' >> "$HOME/.zprofile"

        export PATH="$HOME/bin:$PATH"

        '
  ai-healthcheck:
    component: dev-tools
    profile: configured
    type: config
    state_model: config
    display_name: ai-healthcheck
    depends_on:
    - home-bin-in-path
    driver:
      kind: custom
    oracle:
      configured: '[[ -x "$HOME/bin/ai-healthcheck" ]]'
    evidence:
      path: printf '%s' "$HOME/bin/ai-healthcheck"
    actions:
      install: 'mkdir -p "$HOME/bin"

        install -m 755 "$CFG_DIR/scripts/ai-healthcheck" "$HOME/bin/ai-healthcheck"

        '
  ariaflow:
    component: dev-tools
    profile: runtime
    type: runtime
    display_name: Ariaflow
    depends_on:
    - homebrew
    soft_depends_on:
    - gate:networkquality-available
    provided_by_tool: brew
    driver:
      kind: brew-service
      ref: ariaflow
    endpoints:
    - name: aria2 RPC
      scheme: http
      host: 127.0.0.1
      port: ${aria2_port}
      note: managed by ariaflow
    - name: ariaflow API
      scheme: http
      host: 127.0.0.1
      port: ${ariaflow_port}
      path: /api/status
  ariaflow-web:
    component: dev-tools
    profile: runtime
    type: runtime
    display_name: Ariaflow Web
    depends_on:
    - ariaflow
    provided_by_tool: brew
    driver:
      kind: brew-service
      ref: ariaflow-web
    endpoints:
    - name: ariaflow web UI
      scheme: http
      host: 127.0.0.1
      port: ${ariaflow_web_port}
  cli-jq:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: jq
    depends_on:
    - homebrew
    provided_by_tool: brew
