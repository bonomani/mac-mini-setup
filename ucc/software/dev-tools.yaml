component: dev-tools
primary_profile: runtime
libs: vscode_ext dev_tools
runner: run_dev_tools_from_yaml
platforms:
  - macos
node_version: 24
node_previous_version: 20
omz_theme: agnoster
omz_installer_url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
ariaflow_tap: bonomani/ariaflow
aria2_port: 6800
ariaflow_web_port: 8001
targets:
  vscode:
    component: dev-tools
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew-cask
    oracle:
      configured: "[[ -d '/Applications/Visual Studio Code.app' ]] || is_installed code"

  vscode-code-cmd:
    component: dev-tools
    profile: configured
    type: config
    depends_on:
      - vscode
    oracle:
      configured: "code --version >/dev/null 2>&1"

  vscode-settings:
    component: dev-tools
    profile: configured
    type: config
    depends_on:
      - vscode

  node-lts:
    component: dev-tools
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew
    oracle:
      configured: 'node --version 2>/dev/null | grep -q "^v${_NODE_VER}\."'

  oh-my-zsh:
    component: dev-tools
    profile: configured
    type: config
    oracle:
      configured: '[[ -d "$HOME/.oh-my-zsh" ]]'

  omz-theme-agnoster:
    component: dev-tools
    profile: configured
    type: config
    depends_on:
      - oh-my-zsh

  home-bin-in-path:
    component: dev-tools
    profile: configured
    type: config

  ai-healthcheck:
    component: dev-tools
    profile: configured
    type: config
    depends_on:
      - home-bin-in-path
    oracle:
      configured: '[[ -x "$HOME/bin/ai-healthcheck" ]]'

  ariaflow:
    component: dev-tools
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew
    oracle:
      configured: "ariaflow --version >/dev/null 2>&1 || ariaflow lifecycle >/dev/null 2>&1"
    evidence:
      version: "_brew_cached_version ariaflow"

  aria2-launchd:
    component: dev-tools
    profile: runtime
    type: service
    depends_on:
      - ariaflow
    evidence:
      version: "_brew_cached_version aria2"
      pid: "lsof -ti tcp:${aria2_port} 2>/dev/null | head -1"
      port: "${aria2_port}"

  ariaflow-web:
    component: dev-tools
    profile: configured
    type: package
    depends_on:
      - ariaflow
    provided_by_tool: brew
    oracle:
      configured: "brew list ariaflow-web >/dev/null 2>&1"
    evidence:
      version: "_brew_cached_version ariaflow-web"

  ariaflow-web-service:
    component: dev-tools
    profile: runtime
    type: service
    depends_on:
      - ariaflow-web
    oracle:
      configured: "brew services list 2>/dev/null | awk '/^ariaflow-web/ {print $2}' | grep -q '^started$'"
      runtime: 'curl -fsS --max-time 5 "http://127.0.0.1:${_ARIAFLOW_WEB_PORT}" >/dev/null 2>&1'
    evidence:
      version: "_brew_cached_version ariaflow-web"
      pid: "lsof -ti tcp:${ariaflow_web_port} 2>/dev/null | head -1"
      port: "${ariaflow_web_port}"

# Homebrew formula CLI tools
cli_tools:
  - jq
  - wget
  - curl
  - htop
  - tmux
  - fzf
  - ripgrep
  - fd
  - tree
  - uv
  - pnpm
  - gcc
  - gh
  - llama.cpp
  - opencode
  - aria2
  - cmake

# VSCode marketplace extensions
# Note: Claude Code is a CLI tool (npm), not a VSCode marketplace extension
vscode_extensions:
  - ms-python.python
  - ms-python.vscode-pylance
  - ms-toolsai.jupyter
  - ms-vscode.cpptools
  - continue.continue
  - eamodio.gitlens
  - ms-vscode-remote.remote-containers

# npm global packages
npm_packages:
  - "@openai/codex"
  - "@anthropic-ai/claude-code"
  - bmad-method

node_version: "24"
node_previous_version: "20"

# Oh My Zsh
omz_installer_url: "https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh"
omz_theme: "agnoster"

# Ariaflow brew tap and service ports
ariaflow_tap: "bonomani/ariaflow"
aria2_port: "6800"
ariaflow_web_port: "8001"

# Homebrew cask GUI tools
# Fields: name (ucc-target name), id (brew cask identifier)
casks:
  - name: iterm2
    id: iterm2
  - name: lm-studio
    id: lm-studio
