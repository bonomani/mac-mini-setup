  iterm2:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: iTerm2
    depends_on:
    - homebrew
    provided_by_tool: brew-cask
    driver:
      kind: brew
      cask: true
      ref: iterm2
      greedy_auto_updates: true
  lm-studio:
    component: dev-tools
    profile: configured
    type: package
    state_model: package
    display_name: LM Studio
    depends_on:
    - homebrew
    provided_by_tool: brew-cask
