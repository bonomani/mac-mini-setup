component: build-tools
primary_profile: configured
libs: build_tools
runner: run_build_tools_from_yaml
platforms:
- macos
- linux
- wsl2
targets:
  rustup:
    component: build-tools
    profile: configured
    type: package
    state_model: package
    display_name: Rust (rustup)
    driver:
      kind: package
      ref: rustup
      bin: rustup
      fallback_install_url: https://sh.rustup.rs
      fallback_install_args: -y
      externally_managed_updates: true
      github_repo: rust-lang/rustup
  rdpilot:
    component: build-tools
    profile: configured
    type: package
    state_model: package
    display_name: RDPilot
    driver:
      kind: git-repo
      repo: bonomani/rdpilot
      dest: repos/github/bonomani/rdpilot
      github_repo: bonomani/rdpilot
  xrdp:
    component: build-tools
    profile: configured
    type: package
    state_model: package
    display_name: xrdp
    requires: linux,wsl2
    driver:
      kind: package
      ref: xrdp
      github_repo: neutrinolabs/xrdp
