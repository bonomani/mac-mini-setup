component: build-tools
primary_profile: configured
libs: build_tools
runner: run_build_tools_from_yaml
platforms:
- macos
- linux
- wsl2
targets:
  rustup:
    component: build-tools
    profile: configured
    type: package
    display_name: rustup
    driver:
      kind: pkg
      backends:
      - brew: rustup
      - native-pm: rustup
      - curl: https://sh.rustup.rs
      curl_args: -y
      bin: rustup
      github_repo: rust-lang/rustup
  rdpilot:
    component: build-tools
    profile: configured
    type: package
    display_name: RDPilot
    driver:
      kind: git-repo
      repo: bonomani/rdpilot
      dest: repos/github/bonomani/rdpilot
      github_repo: bonomani/rdpilot
  xrdp:
    component: build-tools
    profile: configured
    type: package
    display_name: xrdp
    driver:
      kind: pkg
      backends:
      - native-pm: xrdp
      bin: xrdp
      github_repo: neutrinolabs/xrdp
    requires: linux,wsl2
