component: ollama
primary_profile: runtime
libs: ollama_models ollama
runner: run_ollama_from_yaml
on_fail: ignore
platforms:
  - macos
  - linux
  - wsl2
macos_min_version: 14
installer_url: https://ollama.com/install.sh
brew_service_name: ollama
api_host: 127.0.0.1
api_port: 11434
api_tags_path: /api/tags
log_file: /tmp/ollama.log
fallback_stop_pattern: ollama (serve|app)
fallback_start_cmd: ollama serve
targets:
  ollama-host-supported:
    component: ollama
    profile: configured
    type: precondition
    state_model: config
    oracle:
      configured: |
        if [[ "${HOST_PLATFORM:-unknown}" == "macos" ]]; then
          [[ "$(sw_vers -productVersion 2>/dev/null | awk -F. '{print $1}')" -ge ${macos_min_version} ]]
        else
          [[ "${HOST_PLATFORM:-unknown}" == "linux" || "${HOST_PLATFORM_VARIANT:-unknown}" == "wsl2" ]]
        fi
    evidence:
      platform: "printf '%s' \"${HOST_PLATFORM:-unknown}\""
      version: "if [[ \"${HOST_PLATFORM:-unknown}\" == macos ]]; then sw_vers -productVersion 2>/dev/null || printf unknown; else uname -r 2>/dev/null || printf unknown; fi"
    install_cmd: |
      if [[ "${HOST_PLATFORM:-unknown}" == "macos" ]]; then
        log_warn "Ollama requires macOS ${macos_min_version}+ — current: macOS $(sw_vers -productVersion 2>/dev/null || echo unknown)"
      else
        log_warn "Ollama is not supported on host platform: ${HOST_PLATFORM:-unknown}"
      fi
      return 1

  ollama:
    component: ollama
    profile: runtime
    type: runtime
    display_name: Ollama
    depends_on:
      - ollama-host-supported
    soft_depends_on:
      - gate:ollama-api
    provided_by_tool: ollama-installer
    runtime_manager: custom
    probe_kind: http
    oracle:
      configured: "ollama --version >/dev/null 2>&1"
      runtime: 'curl -fsS "http://${api_host}:${api_port}${api_tags_path}" >/dev/null 2>&1'
    evidence:
      version: "ollama --version 2>/dev/null | awk '{print $NF}'"
      path: "command -v ollama 2>/dev/null"
      pid: "pgrep -f 'ollama (serve|app)' 2>/dev/null | head -1"
      listener: "printf 'tcp:${api_host}:${api_port}'"
    endpoints:
      - name: Ollama API
        url: http://${api_host}:${api_port}
        note: ollama pull <model>
    stopped_health: Unavailable

  ollama-model-llama3.2:
    component: ollama
    profile: configured
    type: package
    state_model: package
    display_name: Ollama llama3.2
    depends_on:
      - ollama
    provided_by_tool: ollama
    package_driver: ollama-model
    model_ref: llama3.2
    observe_cmd: "ollama_model_present '${model_ref}' && printf '%s' '${model_ref}' || printf absent"
    evidence:
      model: "printf '%s' '${model_ref}'"
    install_cmd: "log_info 'Pulling model: ${model_ref}'; ucc_run ollama pull '${model_ref}'"
    update_cmd: "log_info 'Pulling model: ${model_ref}'; ucc_run ollama pull '${model_ref}'"

