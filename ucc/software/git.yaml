component: git
primary_profile: configured
libs: git
runner: run_git_from_yaml
platforms:
  - macos
  - linux
  - wsl2

targets:
  git:
    component: git
    profile: configured
    type: package
    state_model: package
    display_name: Git
    depends_on:
      - homebrew
    provided_by_tool: brew
    package_driver: brew-formula
    observe_cmd: "brew_observe git"
    evidence:
      version: "_brew_cached_version git"
    install_cmd: "brew_install git"
    update_cmd: "brew_upgrade git"
