component: git
primary_profile: configured
libs: git
runner: run_git_from_yaml
platforms:
- macos
- linux
- wsl2
targets:
  git:
    component: git
    profile: configured
    type: package
    state_model: package
    display_name: Git
    depends_on:
    - homebrew
    provided_by_tool: brew
    driver:
      kind: brew-formula
    observe_cmd: brew_observe git
    evidence:
      version: _brew_cached_version git
    actions:
      install: brew_install git
      update: brew_upgrade git
