  pip-group-langchain:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: LangChain packages
    depends_on:
      - pip-latest
    provided_by_tool: pip
    probe_pkg: langchain-core
    install_packages: langchain-core>=1.0.0 langchain langchain-community langchain-ollama langgraph
    min_version: 1.0.0
    observe_cmd: |
      ver="$(_pip_cached_version "${probe_pkg}")"
      if [[ -z "$ver" ]]; then
        printf 'absent'
      elif python3 -c "from packaging.version import Version; import sys; raise SystemExit(0 if Version('${min_version}') <= Version(sys.argv[1]) else 1)" "$ver" 2>/dev/null; then
        printf '%s' "$ver"
      else
        printf 'absent'
      fi
    evidence:
      version: "_pip_cached_version '${probe_pkg}'"
      pkg: "printf '%s' '${probe_pkg}'"
    install_cmd: "ucc_run pip install -q ${install_packages} && pip_cache_versions"
    update_cmd: "ucc_run pip install -q --upgrade ${install_packages} && pip_cache_versions"

