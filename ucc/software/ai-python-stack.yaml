component: ai-python-stack
primary_profile: runtime
libs: pip_group unsloth_studio
runner: run_ai_python_stack_from_yaml
platforms:
- macos
- linux
- wsl2
preferences:
- name: python-version
  default: 3.12.3
  options: 3.11.9|3.12.3|3.13.0
  rationale: 3.12.3 is the tested stable release with best ML library support; 3.13
    is newer but less tested with PyTorch/HF
- name: pytorch-device
  default: mps
  options: mps|cpu
  platforms:
  - macos
  rationale: mps uses Apple Silicon Metal GPU for ML acceleration; cpu works everywhere
    but is significantly slower
unsloth_label: ai.unsloth.studio
unsloth_plist_marker: <!-- ai.unsloth.studio v2 -->
unsloth_plist_relpath: Library/LaunchAgents/ai.unsloth.studio.plist
unsloth_service_name: unsloth-studio
unsloth_host: 0.0.0.0
unsloth_log_file: .unsloth-studio.log
unsloth_port: 8888
unsloth_studio_dir: .unsloth/studio
systemd_user_dir: .config/systemd/user
gpu_backend: Metal
python_version: 3.12.3
pyenv_dir: .pyenv
zsh_config: .zshrc
pyenv_packages:
- pyenv
- pyenv-virtualenv
pip_bootstrap:
- pip
- setuptools
- wheel
targets:
  pyenv:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: pyenv
    driver:
      kind: pyenv-brew
  xz:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: XZ Utils
    update_class: lib
    driver:
      kind: pkg
      backends:
      - brew: xz
      - native-pm: xz-utils
      bin: xz
  python:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Python
    depends_on:
    - xz
    - pyenv
    driver:
      kind: pkg
      backends:
      - pyenv: ${python_version}
  pip-latest:
    component: ai-python-stack
    profile: configured
    type: config
    display_name: pip
    depends_on:
    - python
    driver:
      kind: pip-bootstrap
  python-venv-available:
    component: ai-python-stack
    profile: capability
    type: capability
    display_name: Python venv module
    depends_on:
    - python
    driver:
      kind: capability
      probe: python_venv_is_available
    evidence:
      status: python_venv_status
  unsloth:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Unsloth
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: unsloth
      probe_pkg: unsloth
      install_packages: unsloth
      min_version: ''
  unsloth-studio:
    component: ai-python-stack
    profile: runtime
    type: runtime
    display_name: Unsloth Studio (launchd)
    depends_on:
    - unsloth
    driver:
      kind: custom
    runtime_manager: launchd
    probe_kind: http
    oracle:
      runtime: http_probe_endpoint
    evidence:
      plist: home_path "${unsloth_plist_relpath}"
    endpoints:
    - name: Unsloth Studio
      scheme: http
      host: 127.0.0.1
      port: ${unsloth_port}
    requires: macos
  unsloth-studio-service:
    component: ai-python-stack
    profile: runtime
    type: runtime
    display_name: Unsloth Studio (systemd)
    depends_on:
    - unsloth
    driver:
      kind: custom
    runtime_manager: systemd
    probe_kind: http
    oracle:
      runtime: http_probe_endpoint
    evidence:
      service: systemd_service_unit "${unsloth_service_name}"
    endpoints:
    - name: Unsloth Studio
      scheme: http
      host: 127.0.0.1
      port: ${unsloth_port}
    requires: linux,wsl2
  pip-group-pytorch:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: PyTorch packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: torch
      install_packages: torch torchvision torchaudio
      min_version: ''
  pip-group-huggingface:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Hugging Face packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: transformers
      install_packages: transformers diffusers accelerate datasets tokenizers sentencepiece
        huggingface-hub peft trl
      min_version: ''
  pip-group-langchain:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: LangChain packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: langchain-core
      install_packages: langchain-core>=1.0.0 langchain langchain-community langchain-ollama
        langgraph
      min_version: 1.0.0
  pip-group-llamaindex:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: LlamaIndex packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: llama-index
      install_packages: llama-index llama-index-llms-ollama llama-index-embeddings-ollama
      min_version: ''
  pip-group-llm-clients:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: LLM client packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: openai
      install_packages: openai anthropic tiktoken
      min_version: ''
  pip-group-vector-dbs:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Vector database packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: chromadb
      install_packages: chromadb faiss-cpu qdrant-client
      min_version: ''
  pip-group-jupyter:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Jupyter packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: jupyterlab
      install_packages: jupyterlab ipywidgets nbformat
      min_version: ''
  pip-group-serving:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Serving packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: fastapi
      install_packages: fastapi uvicorn gradio
      min_version: ''
  pip-group-data-science:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Data science packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: numpy
      install_packages: numpy pandas scipy scikit-learn matplotlib seaborn
      min_version: ''
  pip-group-utilities:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Utility packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: python-dotenv
      install_packages: python-dotenv rich tqdm
      min_version: ''
  pip-group-dev-tools:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Python dev tools
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: ruff
      install_packages: ruff
      min_version: ''
  pip-group-optimum:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Optimum packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: optimum
      install_packages: optimum
      min_version: ''
  pip-group-web-testing:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Web testing packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: pytest
      install_packages: pytest hypothesis beautifulsoup4 playwright mypy coverage
      min_version: ''
  pip-group-formal:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: Formal verification packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: z3-solver
      install_packages: z3-solver
      min_version: ''
  pip-group-lsp:
    component: ai-python-stack
    profile: configured
    type: package
    display_name: LSP server packages
    depends_on:
    - python-venv-available
    driver:
      kind: pip
      isolation:
        kind: venv
        name: ai-modern
      probe_pkg: pygls
      install_packages: pygls
      min_version: ''
  mps-available:
    component: ai-python-stack
    profile: capability
    type: capability
    display_name: Metal MPS
    depends_on:
    - pip-group-pytorch
    driver:
      kind: capability
      probe: torch_mps_available
    evidence:
      gpu: echo_var "${gpu_backend}"
      status: torch_mps_status
    requires: macos
  cuda-available:
    component: ai-python-stack
    profile: capability
    type: capability
    display_name: NVIDIA CUDA
    depends_on:
    - pip-group-pytorch
    driver:
      kind: capability
      probe: torch_cuda_available
    evidence:
      device: torch_cuda_device_name
      status: torch_cuda_status
    requires: linux,wsl2
pip_groups:
- pip-group-pytorch
- pip-group-huggingface
- pip-group-langchain
- pip-group-llamaindex
- pip-group-llm-clients
- pip-group-vector-dbs
- pip-group-jupyter
- pip-group-serving
- pip-group-data-science
- pip-group-utilities
- pip-group-dev-tools
- pip-group-optimum
- pip-group-web-testing
- pip-group-formal
- pip-group-lsp
