    profile: capability
    type: capability
    display_name: Metal MPS
    depends_on:
      - pip-group-pytorch
    runtime_manager: capability
    probe_kind: command
    oracle:
      runtime: "python3 -c \"import torch; raise SystemExit(0 if torch.backends.mps.is_available() else 1)\" 2>/dev/null"
    evidence:
      gpu: "printf 'Metal'"
      status: "python3 -c \"import torch; print('available' if torch.backends.mps.is_available() else 'unavailable (CPU only)')\" 2>/dev/null || printf 'unavailable (CPU only)'"
# Each entry is a target name; target-local metadata carries the pip probe and install set.
