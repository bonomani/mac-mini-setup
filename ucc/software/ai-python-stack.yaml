component: ai-python-stack
primary_profile: runtime
libs: pip_group unsloth_studio
runner: run_ai_python_stack_from_yaml
platforms:
  - macos
unsloth_port: 8888
unsloth_studio_dir: .unsloth/studio
targets:
  unsloth-studio:
    component: ai-python-stack
    profile: runtime
    type: runtime
    depends_on:
      - python
      - pip-latest
    runtime_manager: launchd
    probe_kind: http
    oracle:
      configured: '[[ -d "$HOME/${unsloth_studio_dir}" ]]'
      runtime: 'curl -fsS --max-time 5 "http://127.0.0.1:${unsloth_port}" >/dev/null 2>&1'
    endpoints:
      - name: Unsloth Studio
        url: http://0.0.0.0:8888

  pip-group-pytorch:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-huggingface:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-langchain:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-llamaindex:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-llm-clients:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-vector-dbs:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-jupyter:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-serving:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-data-science:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-utilities:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-dev-tools:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  pip-group-optimum:
    component: ai-python-stack
    profile: configured
    type: package
    depends_on:
      - pip-latest

  mps-available:
    component: ai-python-stack
    profile: capability
    type: runtime
    depends_on:
      - pip-group-pytorch
    runtime_manager: capability
    probe_kind: command
# Fields:
#   name        ucc-target suffix and _pip_group identifier
#   probe       package name used for pip show / version detection
#   packages    space-separated packages passed to pip install
#   min_version (optional) minimum acceptable version of the probe package;
#               triggers a version-aware observe that forces upgrade if below this

pip_groups:
  - name: pytorch
    probe: torch
    packages: torch torchvision torchaudio

  - name: huggingface
    probe: transformers
    packages: transformers diffusers accelerate datasets tokenizers sentencepiece huggingface-hub peft trl

  - name: langchain
    probe: langchain-core
    min_version: 1.0.0
    packages: langchain-core>=1.0.0 langchain langchain-community langchain-ollama langgraph

  - name: llamaindex
    probe: llama-index
    packages: llama-index llama-index-llms-ollama llama-index-embeddings-ollama

  - name: llm-clients
    probe: openai
    packages: openai anthropic

  - name: vector-dbs
    probe: chromadb
    packages: chromadb faiss-cpu qdrant-client

  - name: jupyter
    probe: jupyterlab
    packages: jupyterlab ipywidgets nbformat

  - name: serving
    probe: fastapi
    packages: fastapi uvicorn gradio

  - name: data-science
    probe: numpy
    packages: numpy pandas scipy scikit-learn matplotlib seaborn

  - name: utilities
    probe: python-dotenv
    packages: python-dotenv rich tqdm

  - name: dev-tools
    probe: ruff
    packages: ruff

  - name: optimum
    probe: optimum
    packages: optimum

# Unsloth Studio service configuration
unsloth_studio:
  label: "ai.unsloth.studio"
  plist_marker: "<!-- ai.unsloth.studio v2 -->"
  port: "8888"
  host: "0.0.0.0"
  studio_dir: ".unsloth/studio"
  log_file: ".unsloth-studio.log"
