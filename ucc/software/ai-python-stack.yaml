component: ai-python-stack
primary_profile: runtime
libs: pip_group unsloth_studio
runner: run_ai_python_stack_from_yaml
platforms:
  - macos
unsloth_label: ai.unsloth.studio
unsloth_plist_marker: "<!-- ai.unsloth.studio v2 -->"
unsloth_host: 0.0.0.0
unsloth_log_file: .unsloth-studio.log
unsloth_port: 8888
unsloth_studio_dir: .unsloth/studio
targets:
  unsloth-studio:
    component: ai-python-stack
    profile: runtime
    type: runtime
    display_name: Unsloth Studio
    depends_on:
      - python
      - pip-latest
    runtime_manager: launchd
    probe_kind: http
    oracle:
      configured: '[[ -d "$HOME/${unsloth_studio_dir}" ]]'
      runtime: |
        launchctl list 2>/dev/null | grep -q "${unsloth_label}" &&
        grep -qF "${unsloth_plist_marker}" "$HOME/Library/LaunchAgents/${unsloth_label}.plist" 2>/dev/null &&
        curl -fsS --max-time 5 "http://127.0.0.1:${unsloth_port}" >/dev/null 2>&1
    evidence:
      version: "pip show unsloth 2>/dev/null | awk '/^Version:/{print $2}'"
      folder: "printf '%s' \"$HOME/${unsloth_studio_dir}\""
      pid: "pgrep -f 'unsloth.*studio' 2>/dev/null | head -1 || true"
      listener: "printf 'tcp:127.0.0.1:${unsloth_port}'"
      plist: "printf '%s/Library/LaunchAgents/${unsloth_label}.plist' \"$HOME\""
    endpoints:
      - name: Unsloth Studio
        url: http://127.0.0.1:${unsloth_port}

  pip-group-pytorch:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: PyTorch packages
    depends_on:
      - pip-latest
    provided_by_tool: pip
    probe_pkg: torch
    install_packages: torch torchvision torchaudio
    min_version: ""
    observe_cmd: |
      ver="$(_pip_cached_version "${probe_pkg}")"
      if [[ -z "$ver" ]]; then
        printf 'absent'
      else
        printf '%s' "$ver"
      fi
    evidence:
      version: "_pip_cached_version '${probe_pkg}'"
      pkg: "printf '%s' '${probe_pkg}'"
    install_cmd: "ucc_run pip install -q ${install_packages} && pip_cache_versions"
    update_cmd: "ucc_run pip install -q --upgrade ${install_packages} && pip_cache_versions"

  pip-group-huggingface:
