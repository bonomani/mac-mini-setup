component: ai-python-stack
primary_profile: runtime
libs: pip_group unsloth_studio
runner: run_ai_python_stack_from_yaml
platforms:
- macos
- linux
- wsl2
unsloth_label: ai.unsloth.studio
unsloth_plist_marker: <!-- ai.unsloth.studio v2 -->
unsloth_plist_relpath: Library/LaunchAgents/ai.unsloth.studio.plist
unsloth_service_name: unsloth-studio
unsloth_host: 0.0.0.0
unsloth_log_file: .unsloth-studio.log
unsloth_port: 8888
unsloth_studio_dir: .unsloth/studio
systemd_user_dir: .config/systemd/user
gpu_backend: Metal
targets:
  unsloth:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: Unsloth
    driver:
      kind: pip
      probe_pkg: unsloth
      install_packages: unsloth
      min_version: ''
  unsloth-studio:
    component: ai-python-stack
    profile: runtime
    type: runtime
    display_name: Unsloth Studio
    depends_on:
    - unsloth
    driver:
      kind: custom
    runtime_manager: launchd
    probe_kind: http
    oracle:
      runtime: http_probe_endpoint
    evidence:
      plist: home_path "${unsloth_plist_relpath}"
    endpoints:
    - name: Unsloth Studio
      scheme: http
      host: 127.0.0.1
      port: ${unsloth_port}
  unsloth-studio-service:
    component: ai-python-stack
    profile: runtime
    type: runtime
    display_name: Unsloth Studio
    depends_on:
    - unsloth
    driver:
      kind: custom
    runtime_manager: systemd
    probe_kind: http
    oracle:
      runtime: http_probe_endpoint
    evidence:
      service: systemd_service_unit "${unsloth_service_name}"
    endpoints:
    - name: Unsloth Studio
      scheme: http
      host: 127.0.0.1
      port: ${unsloth_port}
  pip-group-pytorch:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: PyTorch packages
    driver:
      kind: pip
      probe_pkg: torch
      install_packages: torch torchvision torchaudio
      min_version: ''
  pip-group-huggingface:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: Hugging Face packages
    driver:
      kind: pip
      probe_pkg: transformers
      install_packages: transformers diffusers accelerate datasets tokenizers sentencepiece
        huggingface-hub peft trl
      min_version: ''
  pip-group-langchain:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: LangChain packages
    driver:
      kind: pip
      probe_pkg: langchain-core
      install_packages: langchain-core>=1.0.0 langchain langchain-community langchain-ollama
        langgraph
      min_version: 1.0.0
  pip-group-llamaindex:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: LlamaIndex packages
    driver:
      kind: pip
      probe_pkg: llama-index
      install_packages: llama-index llama-index-llms-ollama llama-index-embeddings-ollama
      min_version: ''
  pip-group-llm-clients:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: LLM client packages
    driver:
      kind: pip
      probe_pkg: openai
      install_packages: openai anthropic
      min_version: ''
  pip-group-vector-dbs:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: Vector database packages
    driver:
      kind: pip
      probe_pkg: chromadb
      install_packages: chromadb faiss-cpu qdrant-client
      min_version: ''
  pip-group-jupyter:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: Jupyter packages
    driver:
      kind: pip
      probe_pkg: jupyterlab
      install_packages: jupyterlab ipywidgets nbformat
      min_version: ''
  pip-group-serving:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: Serving packages
    driver:
      kind: pip
      probe_pkg: fastapi
      install_packages: fastapi uvicorn gradio
      min_version: ''
  pip-group-data-science:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: Data science packages
    driver:
      kind: pip
      probe_pkg: numpy
      install_packages: numpy pandas scipy scikit-learn matplotlib seaborn
      min_version: ''
  pip-group-utilities:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: Utility packages
    driver:
      kind: pip
      probe_pkg: python-dotenv
      install_packages: python-dotenv rich tqdm
      min_version: ''
  pip-group-dev-tools:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: Python dev tools
    driver:
      kind: pip
      probe_pkg: ruff
      install_packages: ruff
      min_version: ''
  pip-group-optimum:
    component: ai-python-stack
    profile: configured
    type: package
    state_model: package
    display_name: Optimum packages
    driver:
      kind: pip
      probe_pkg: optimum
      install_packages: optimum
      min_version: ''
  mps-available:
    component: ai-python-stack
    profile: capability
    type: capability
    display_name: Metal MPS
    depends_on:
    - pip-group-pytorch
    driver:
      kind: custom
    runtime_manager: capability
    probe_kind: command
    oracle:
      runtime: torch_mps_available
    evidence:
      gpu: echo_var "${gpu_backend}"
      status: torch_mps_status
pip_groups:
- pip-group-pytorch
- pip-group-huggingface
- pip-group-langchain
- pip-group-llamaindex
- pip-group-llm-clients
- pip-group-vector-dbs
- pip-group-jupyter
- pip-group-serving
- pip-group-data-science
- pip-group-utilities
- pip-group-dev-tools
- pip-group-optimum
