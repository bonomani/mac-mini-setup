component: network-services
primary_profile: runtime
libs: network_services
runner: run_network_services_from_yaml
platforms:
- macos
- linux
- wsl2
aria2_port: 6800
ariaflow_port: 8000
ariaflow_dashboard_port: 8001
targets:
  networkquality-available:
    component: network-services
    profile: capability
    type: capability
    display_name: networkQuality
    requires: macos
    driver:
      kind: capability
      probe: networkquality_is_available
    evidence:
      path: bin_path networkQuality
  mdns-available:
    component: network-services
    profile: capability
    type: capability
    display_name: mDNS/Bonjour
    driver:
      kind: capability
      probe: mdns_is_available
    evidence:
      path: bin_path dns-sd avahi-publish-service

  avahi:
    component: network-services
    profile: configured
    type: package
    display_name: Avahi (mDNS)
    requires: linux,wsl2
    driver:
      kind: pkg
      backends:
        - native-pm: avahi-utils
    desired_value: "@present"

  ariaflow-server:
    component: network-services
    profile: runtime
    type: runtime
    display_name: Ariaflow Server
    requires: macos
    depends_on:
    - networkquality-available?macos
    - mdns-available
    - avahi?linux,wsl2

    driver:
      kind: service
      backend: brew
      ref: bonomani/ariaflow/ariaflow-server
    endpoints:
    - name: aria2 RPC
      scheme: http
      host: 127.0.0.1
      port: ${aria2_port}
      note: managed by ariaflow
    - name: ariaflow API
      scheme: http
      host: 127.0.0.1
      port: ${ariaflow_port}
      path: /api/status
  ariaflow-dashboard:
    component: network-services
    profile: runtime
    type: runtime
    display_name: Ariaflow Dashboard
    requires: macos
    depends_on:
    - mdns-available
    driver:
      kind: service
      backend: brew
      ref: bonomani/ariaflow/ariaflow-dashboard
    endpoints:
    - name: ariaflow dashboard
      scheme: http
      host: 127.0.0.1
      port: ${ariaflow_dashboard_port}
