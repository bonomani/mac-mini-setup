component: docker
primary_profile: runtime
libs: docker
runner: run_docker_from_yaml
platforms:
- macos
docker_desktop_cask_id: docker-desktop
docker_desktop_app_name: Docker
docker_desktop_app_path: /Applications/Docker.app
docker_socket: $HOME/.docker/run/docker.sock
docker_settings_store_relpath: Library/Group Containers/group.com.docker/settings-store.json
docker_backend_process: com.docker.backend
docker_kill_pattern: com.docker
targets:
  docker-desktop:
    component: docker
    profile: runtime
    type: runtime
    display_name: Docker Desktop
    depends_on:
    - homebrew
    provided_by_tool: brew-cask
    driver:
      kind: custom
      package_ref: ${docker_desktop_cask_id}
      app_name: ${docker_desktop_app_name}
      app_path: ${docker_desktop_app_path}
      greedy_auto_updates: true
    runtime_manager: desktop-app
    probe_kind: command
    oracle:
      configured: is_installed docker
      runtime: docker_daemon_is_running
    observe_cmd: docker_desktop_observe
    evidence:
      version: docker_version
      install_source: docker_install_source_observe
      socket: echo_var "${docker_socket}"
      pid: docker_daemon_pid
    stopped_dependencies: DepsReady
    actions:
      install: _docker_desktop_install_and_start
