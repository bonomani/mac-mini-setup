component: docker
primary_profile: runtime
libs: docker
runner: run_docker_from_yaml
platforms:
- macos
docker_desktop_cask_id: docker-desktop
docker_desktop_app_name: Docker
docker_desktop_app_path: /Applications/Docker.app
docker_runtime_wait_attempts: 36
docker_runtime_wait_interval: 10
docker_socket: $HOME/.docker/run/docker.sock
docker_settings_store: $HOME/Library/Group Containers/group.com.docker/settings-store.json
targets:
  docker-desktop:
    component: docker
    profile: configured
    type: package
    state_model: package
    display_name: Docker Desktop
    depends_on:
    - homebrew
    provided_by_tool: brew-cask
    driver:
      kind: custom
      package_ref: ${docker_desktop_cask_id}
      app_name: ${docker_desktop_app_name}
      app_path: ${docker_desktop_app_path}
      greedy_auto_updates: true
    oracle:
      configured: command -v docker >/dev/null 2>&1
    observe_cmd: command -v docker >/dev/null 2>&1 && echo installed || echo absent
    evidence:
      version: docker --version 2>/dev/null | awk '{print $3}' | tr -d ','
      install_source: src="$(desktop_app_install_source "${docker_desktop_cask_id}" "${docker_desktop_app_path}")"; [[ "$src"
        != "absent" && "$src" != "brew-cask" ]] && printf '%s' "$src"
    actions:
      install: "policy=\"${UIC_PREF_PREFERRED_DRIVER_POLICY:-warn}\"\ninstall_source=\"$(desktop_app_install_source \"${docker_desktop_cask_id}\"\
        \ \"${docker_desktop_app_path}\")\"\nif [[ \"$install_source\" == \"app-bundle\" ]]; then\n  case \"$policy\" in\n\
        \    ignore)\n      log_info \"Docker Desktop installed outside brew-cask; ignoring (policy=ignore).\"\n      return\
        \ 0\n      ;;\n    warn)\n      log_warn \"Docker Desktop is installed outside preferred driver brew-cask; set preferred-driver-policy=migrate\
        \ to adopt it.\"\n      return 124\n      ;;\n    migrate)\n      sudo -n true >/dev/null 2>&1 || { log_warn \"Migrating\
        \ Docker Desktop requires admin privileges; run: sudo -v\"; return 125; }\n      brew_cask_migrate_install \"${docker_desktop_cask_id}\"\
        \ || return 1\n      ;;\n    *)\n      log_warn \"Unknown preferred-driver-policy '$policy'; treating as warn.\"\n\
        \      return 124\n      ;;\n  esac\nfi\nobserved=\"$(brew_cask_observe \"${docker_desktop_cask_id}\" \"${driver.greedy_auto_updates}\"\
        )\"\nif [[ \"$observed\" == \"absent\" && -d \"${docker_desktop_app_path}\" ]]; then\n  observed=\"installed\"\nfi\n\
        if [[ \"$observed\" == \"absent\" ]]; then\n  brew_cask_install \"${docker_desktop_cask_id}\" || return 1\nelif [[\
        \ \"$observed\" == \"outdated\" ]]; then\n  brew_cask_upgrade \"${docker_desktop_cask_id}\" \"${driver.greedy_auto_updates}\"\
        \ || return 1\nfi\nlog_info \"Configuring Docker Desktop silent launch...\"\n_store=\"${docker_settings_store}\"\n\
        if [[ -f \"$_store\" ]]; then\n  _tmp=\"$(mktemp)\"\n  jq '. + {\"OpenUIOnStartupDisabled\": true, \"DisplayedOnboarding\"\
        : true, \"ShowInstallScreen\": false}' \"$_store\" > \"$_tmp\" && mv \"$_tmp\" \"$_store\" || rm -f \"$_tmp\"\nelse\n\
        \  mkdir -p \"$(dirname \"$_store\")\"\n  printf '{\"OpenUIOnStartupDisabled\":true,\"DisplayedOnboarding\":true,\"\
        ShowInstallScreen\":false}\\n' > \"$_store\"\nfi\n"
  docker-daemon:
    component: docker
    profile: runtime
    type: runtime
    display_name: Docker Daemon
    depends_on:
    - docker-desktop
    driver:
      kind: custom
    runtime_manager: desktop-app
    probe_kind: command
    oracle:
      configured: command -v docker >/dev/null 2>&1
      runtime: '[[ -S "${docker_socket}" ]] && docker info >/dev/null 2>&1'
    evidence:
      socket: printf '%s' "${docker_socket}"
      pid: pgrep -f "com.docker.backend" 2>/dev/null | head -1
    stopped_dependencies: DepsReady
    actions:
      install: "log_info \"Starting Docker Desktop...\"\nif ! pgrep -f \"com.docker.backend\" >/dev/null 2>&1; then\n\
        \  open -g -a \"${docker_desktop_app_name}\" 2>/dev/null || true\nfi\nlog_info \"Waiting for Docker daemon...\"\n\
        UCC_RUNTIME_WAIT_ATTEMPTS=\"${docker_runtime_wait_attempts}\" \\\nUCC_RUNTIME_WAIT_INTERVAL=\"${docker_runtime_wait_interval}\"\
        \ \\\n  _ucc_wait_for_runtime_probe \"[[ -S \\\"${docker_socket}\\\" ]] && docker info >/dev/null 2>&1\" \\\n  ||\
        \ log_warn \"Docker daemon not ready yet — re-run once Docker Desktop has finished starting.\"\n"
