component: docker
primary_profile: runtime
libs: docker
runner: run_docker_from_yaml
platforms:
- macos
preferences:
- name: docker-memory-gb
  default: 48
  options: 16|32|48|56
  rationale: 48 GB leaves 16 GB for macOS and native processes on a 64 GB machine; 56 risks host instability under load
- name: docker-cpu-count
  default: 10
  options: 4|6|8|10|12
  rationale: 10 cores leaves 2 for macOS scheduler; 12 (all) risks UI unresponsiveness during heavy container workloads
- name: docker-swap-mib
  default: 4096
  options: 1024|2048|4096|8192
  rationale: 4096 MiB swap is adequate for most AI workloads; increase if you see out-of-memory errors under heavy load
- name: docker-disk-mib
  default: 204800
  options: 102400|204800|307200|512000
  rationale: 200 GB (204800 MiB) covers large AI models and containers; increase for multi-model or large-dataset setups
- name: docker-first-install
  default: manual
  options: manual|assisted
  rationale: manual fails fast in non-interactive mode and requires the user to bootstrap Docker once interactively (sudo + macOS auth dialog + EULA accept); assisted runs the experimental recipe that pre-writes EULA settings, seeds vmnetd to bypass the auth dialog, and uses a SUDO_ASKPASS helper so brew's sudo calls succeed non-interactively
docker_desktop_cask_id: docker-desktop
docker_desktop_app_name: Docker
docker_desktop_app_path: /Applications/Docker.app
docker_socket: $HOME/.docker/run/docker.sock
docker_backend_process: com.docker.backend
docker_kill_pattern: com.docker
settings_relpath: Library/Group Containers/group.com.docker/settings-store.json
targets:
  docker-desktop:
    component: docker
    profile: runtime
    type: runtime
    display_name: Docker Desktop

    depends_on:
    - homebrew
    provided_by_tool: brew-cask
    driver:
      kind: custom
      package_ref: ${docker_desktop_cask_id}
      app_name: ${docker_desktop_app_name}
      app_path: ${docker_desktop_app_path}
      greedy_auto_updates: false
    runtime_manager: desktop-app
    probe_kind: command
    oracle:
      configured: is_installed docker
      runtime: docker_daemon_is_running
    observe_cmd: docker_desktop_observe
    evidence:
      version: docker_version
      install_source: docker_install_source_observe
      socket: echo_var "${docker_socket}"
      pid: docker_daemon_pid
    stopped_dependencies: DepsReady
    actions:
      install: _docker_desktop_install_and_start
  docker-resources:
    component: docker
    profile: parametric
    type: config
    state_model: parametric
    display_name: Docker resources
    depends_on:
    - docker-desktop
    driver:
      kind: custom
      settings_relpath: ${settings_relpath}
      memory_gb: 48
      cpu_count: 10
      swap_mib: 4096
      disk_mib: 204800
    observe_cmd: docker_resources_observe
    desired_cmd: docker_resources_desired
    evidence:
      value: docker_resources_observe
    actions:
      install: docker_resources_apply
      update: docker_resources_apply
  docker-available:
    component: docker
    profile: capability
    type: capability
    display_name: Docker daemon

    depends_on:
    - docker-desktop
    driver:
      kind: capability
      probe: docker_daemon_is_running
    evidence:
      status: docker_daemon_status
