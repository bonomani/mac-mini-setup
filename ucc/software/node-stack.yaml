component: node-stack
primary_profile: runtime
libs: node_stack
runner: run_node_stack_from_yaml
platforms:
- macos
- linux
- wsl2
node_version: 24
nvm_dir: .nvm
node_formula: node
targets:
  nvm:
    component: node-stack
    profile: configured
    type: package
    display_name: nvm
    driver:
      kind: nvm
      nvm_dir: ${nvm_dir}
      github_repo: nvm-sh/nvm
  node-lts:
    component: node-stack
    profile: configured
    type: package
    display_name: Node.js LTS
    driver:
      kind: nvm-version
      version: ${node_version}
      nvm_dir: ${nvm_dir}
  brew-node-unlinked:
    component: node-stack
    profile: configured
    type: config
    display_name: Brew node unlinked
    depends_on:
    - node-lts
    driver:
      kind: brew-unlink
      formula: ${node_formula}
  npm-global-@openai/codex:
    component: node-stack
    profile: configured
    type: package
    display_name: Codex CLI
    depends_on:
    - node-lts
    driver:
      kind: pkg
      backends:
      - npm: '@openai/codex'
      bin: codex
  npm-global-@anthropic-ai/claude-code:
    component: node-stack
    profile: configured
    type: package
    display_name: Claude Code CLI
    depends_on:
    - node-lts
    driver:
      kind: pkg
      backends:
      - npm: '@anthropic-ai/claude-code'
      bin: claude-code
  npm-global-bmad-method:
    component: node-stack
    profile: configured
    type: package
    display_name: BMAD Method CLI
    depends_on:
    - node-lts
    driver:
      kind: pkg
      backends:
      - npm: bmad-method
      bin: bmad-method
npm_packages:
- npm-global-@openai/codex
- npm-global-@anthropic-ai/claude-code
- npm-global-bmad-method
