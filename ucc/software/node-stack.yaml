component: node-stack
primary_profile: runtime
libs: node_stack
runner: run_node_stack_from_yaml
platforms:
- macos
- linux
- wsl2
node_version: 24
nvm_dir: .nvm
node_formula: node
ariaflow_tap: bonomani/ariaflow
aria2_port: 6800
ariaflow_port: 8000
ariaflow_web_port: 8001
targets:
  nvm:
    component: node-stack
    profile: configured
    type: package
    state_model: package
    display_name: nvm
    driver:
      kind: nvm
      nvm_dir: ${nvm_dir}
  node-lts:
    component: node-stack
    profile: configured
    type: package
    state_model: package
    display_name: Node.js LTS
    driver:
      kind: nvm-version
      version: ${node_version}
      nvm_dir: ${nvm_dir}
  brew-node-unlinked:
    component: node-stack
    profile: configured
    type: config
    state_model: config
    display_name: Brew node unlinked
    depends_on:
    - node-lts
    driver:
      kind: brew-unlink
      formula: ${node_formula}
  npm-global-@openai/codex:
    component: node-stack
    profile: configured
    type: package
    state_model: package
    display_name: Codex CLI
    driver:
      kind: npm-global
      package: '@openai/codex'
  npm-global-@anthropic-ai/claude-code:
    component: node-stack
    profile: configured
    type: package
    state_model: package
    display_name: Claude Code CLI
    driver:
      kind: npm-global
      package: '@anthropic-ai/claude-code'
  npm-global-bmad-method:
    component: node-stack
    profile: configured
    type: package
    state_model: package
    display_name: BMAD Method CLI
    driver:
      kind: npm-global
      package: bmad-method
  networkquality-available:
    component: node-stack
    profile: capability
    type: capability
    display_name: networkQuality
    driver:
      kind: custom
    runtime_manager: capability
    probe_kind: command
    oracle:
      runtime: networkquality_is_available
    evidence:
      path: bin_path networkQuality
  ariaflow:
    component: node-stack
    profile: runtime
    type: runtime
    display_name: Ariaflow
    depends_on:
    - networkquality-available
    driver:
      kind: brew-service
      ref: ariaflow
    endpoints:
    - name: aria2 RPC
      scheme: http
      host: 127.0.0.1
      port: ${aria2_port}
      note: managed by ariaflow
    - name: ariaflow API
      scheme: http
      host: 127.0.0.1
      port: ${ariaflow_port}
      path: /api/status
  ariaflow-web:
    component: node-stack
    profile: runtime
    type: runtime
    display_name: Ariaflow Web
    driver:
      kind: brew-service
      ref: ariaflow-web
    endpoints:
    - name: ariaflow web UI
      scheme: http
      host: 127.0.0.1
      port: ${ariaflow_web_port}
npm_packages:
- npm-global-@openai/codex
- npm-global-@anthropic-ai/claude-code
- npm-global-bmad-method
