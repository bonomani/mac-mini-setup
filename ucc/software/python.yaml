component: python
primary_profile: configured
libs: python
runner: run_python_from_yaml
platforms:
  - macos
  - linux
  - wsl2
python_version: 3.12.3
targets:
  pyenv:
    component: python
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew
    oracle:
      configured: "pyenv --version >/dev/null 2>&1"

  xz:
    component: python
    profile: configured
    type: package
    depends_on:
      - homebrew
    provided_by_tool: brew
    oracle:
      configured: "brew list xz >/dev/null 2>&1"

  python:
    component: python
    profile: configured
    type: package
    depends_on:
      - pyenv
      - xz
    oracle:
      configured: "python3 --version >/dev/null 2>&1"
      runtime: "python3 -c 'import lzma'"

  pip-latest:
    component: python
    profile: configured
    type: config
    state_model: config
    depends_on:
      - python
    oracle:
      configured: "pip --version >/dev/null 2>&1"
    evidence:
      version: "pip --version 2>/dev/null | awk '{print $2}'"
      path: "command -v pip 2>/dev/null || true"
    install_cmd: |
      local pkgs
      pkgs="$(python3 "$CFG_DIR/tools/read_config.py" --list "$YAML_PATH" pip_bootstrap 2>/dev/null | xargs)"
      [[ -n "$pkgs" ]] && pip install --upgrade $pkgs

pyenv_packages:
  - pyenv
  - pyenv-virtualenv

pip_bootstrap:
  - pip
  - setuptools
  - wheel
