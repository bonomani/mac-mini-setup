component: python
primary_profile: configured
libs: python
runner: run_python_from_yaml
platforms:
- macos
- linux
- wsl2
python_version: 3.12.3
targets:
  pyenv:
    component: python
    profile: configured
    type: package
    state_model: package
    display_name: pyenv
    depends_on:
    - homebrew
    provided_by_tool: brew
    driver:
      kind: custom
    observe_cmd: brew_observe pyenv
    evidence:
      version: pyenv --version 2>/dev/null | awk '{print $2}'
      root: pyenv root 2>/dev/null || true
    actions:
      install: 'pkgs="$(python3 "$CFG_DIR/tools/read_config.py" --list "$YAML_PATH"
        pyenv_packages 2>/dev/null | xargs)"

        [[ -n "$pkgs" ]] || pkgs="pyenv pyenv-virtualenv"

        brew_install $pkgs

        grep -q ''pyenv init'' "$HOME/.zshrc" 2>/dev/null || cat "$CFG_DIR/scripts/pyenv-zshrc-snippet"
        >> "$HOME/.zshrc"

        '
      update: 'pkgs="$(python3 "$CFG_DIR/tools/read_config.py" --list "$YAML_PATH"
        pyenv_packages 2>/dev/null | xargs)"

        [[ -n "$pkgs" ]] || pkgs="pyenv pyenv-virtualenv"

        brew_upgrade $pkgs

        '
  xz:
    component: python
    profile: configured
    type: package
    state_model: package
    display_name: XZ Utils
    depends_on:
    - homebrew
    provided_by_tool: brew
    driver:
      kind: brew
      ref: xz
  python:
    component: python
    profile: configured
    type: package
    state_model: package
    display_name: Python
    depends_on:
    - pyenv
    - xz
    provided_by_tool: pyenv
    driver:
      kind: pyenv-version
      version: ${python_version}
  pip-latest:
    component: python
    profile: configured
    type: config
    state_model: config
    display_name: pip
    depends_on:
    - python
    driver:
      kind: custom
    oracle:
      configured: pip --version >/dev/null 2>&1
    evidence:
      version: pip --version 2>/dev/null | awk '{print $2}'
      path: command -v pip 2>/dev/null || true
    actions:
      install: 'local pkgs

        pkgs="$(python3 "$CFG_DIR/tools/read_config.py" --list "$YAML_PATH" pip_bootstrap
        2>/dev/null | xargs)"

        [[ -n "$pkgs" ]] && pip install --upgrade $pkgs

        '
pyenv_packages:
- pyenv
- pyenv-virtualenv
pip_bootstrap:
- pip
- setuptools
- wheel
