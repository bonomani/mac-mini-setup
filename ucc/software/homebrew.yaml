component: software-bootstrap
primary_profile: configured
libs: homebrew
runner: run_homebrew_from_yaml
on_fail: exit
platforms:
- macos
- linux
- wsl2
platform_tool_preferences:
  macos:
  - brew-installer
  linux:
  - native-package-manager
  - brew-installer
  wsl2:
  - native-package-manager
  - brew-installer
targets:
  network-available:
    component: software-bootstrap
    profile: capability
    type: capability
    display_name: Network connectivity
    driver:
      kind: custom
    runtime_manager: capability
    probe_kind: command
    oracle:
      runtime: network_is_available
    evidence:
      status: network_status
  build-deps:
    component: software-bootstrap
    profile: configured
    type: package
    state_model: package
    display_name: Build dependencies
    provided_by_tool: native-package-manager
    driver:
      kind: build-deps
  xcode-command-line-tools:
    component: software-bootstrap
    profile: configured
    type: package
    state_model: package
    display_name: Xcode Command Line Tools
    provided_by_tool: macos-installer
    driver:
      kind: custom
      externally_managed_updates: true
    oracle:
      configured: xcode_clt_is_installed
    observe_cmd: xcode_clt_observe
    evidence:
      version: xcode_clt_version
      path: xcode_clt_path
    actions:
      install: _xcode_clt_trigger
      update: xcode_clt_update
  homebrew:
    component: software-bootstrap
    profile: configured
    type: package
    state_model: package
    display_name: Homebrew
    depends_on_by_platform:
      macos:
      - xcode-command-line-tools
      linux:
      - build-deps
      wsl2:
      - build-deps
    provided_by_tool: brew-installer
    driver:
      kind: custom
    observe_cmd: homebrew_observe
    evidence:
      version: homebrew_version
      path: bin_path brew
    actions:
      install: _homebrew_install
      update: _homebrew_upgrade
  brew-analytics=off:
    component: software-bootstrap
    profile: parametric
    type: config
    state_model: parametric
    display_name: Homebrew analytics
    depends_on:
    - homebrew
    driver:
      kind: brew-analytics
    desired_value: ${analytics_desired}
installer_url: https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh
analytics_desired: 'off'
shell_config_file: .zprofile
