component: software-bootstrap
primary_profile: configured
libs: homebrew
runner: run_homebrew_from_yaml
on_fail: exit
platforms:
- macos
- linux
- wsl2
platform_tool_preferences:
  macos:
  - brew-installer
  linux:
  - native-package-manager
  - brew-installer
  wsl2:
  - native-package-manager
  - brew-installer
targets:
  xcode-command-line-tools:
    component: software-bootstrap
    profile: configured
    type: package
    state_model: package
    display_name: Xcode Command Line Tools
    provided_by_tool: macos-installer
    driver:
      kind: custom
      externally_managed_updates: true
    oracle:
      configured: xcode-select -p >/dev/null 2>&1
    observe_cmd: xcode_clt_observe
    evidence:
      version: xcode_clt_version
      path: xcode_clt_path
    actions:
      install: _xcode_clt_trigger
      update: xcode_clt_update
  homebrew:
    component: software-bootstrap
    profile: configured
    type: package
    state_model: package
    display_name: Homebrew
    depends_on_by_platform:
      macos:
      - xcode-command-line-tools
    provided_by_tool: brew-installer
    driver:
      kind: custom
    observe_cmd: homebrew_observe
    evidence:
      version: homebrew_version
      path: bin_path brew
    actions:
      install: _homebrew_install "${shell_config_file}" "${installer_url}"
      update: _homebrew_upgrade "${shell_config_file}"
  brew-analytics=off:
    component: software-bootstrap
    profile: parametric
    type: config
    state_model: parametric
    display_name: Homebrew analytics
    depends_on:
    - homebrew
    driver:
      kind: brew-analytics
    desired_value: ${analytics_desired}
installer_url: https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh
analytics_desired: 'off'
shell_config_file: .zprofile
