component: homebrew
primary_profile: configured
libs: homebrew
runner: run_homebrew_from_yaml
on_fail: exit
platforms:
- macos
- linux
- wsl2
platform_tool_preferences:
  macos:
  - brew-installer
  linux:
  - native-package-manager
  - brew-installer
  wsl2:
  - native-package-manager
  - brew-installer
targets:
  xcode-command-line-tools:
    component: homebrew
    profile: configured
    type: package
    state_model: package
    display_name: Xcode Command Line Tools
    provided_by_tool: macos-installer
    driver:
      kind: custom
      externally_managed_updates: true
    oracle:
      configured: xcode-select -p >/dev/null 2>&1
    observe_cmd: "if ! xcode-select -p >/dev/null 2>&1; then\n  printf 'absent'\n\
      elif softwareupdate --list 2>/dev/null | grep -qi 'Command Line Tools for Xcode';\
      \ then\n  printf 'outdated'\nelse\n  ver=\"$(pkgutil --pkg-info=com.apple.pkg.CLTools_Executables\
      \ 2>/dev/null | awk '/^version:/ {print $2}')\"\n  printf '%s' \"${ver:-present}\"\
      \nfi\n"
    evidence:
      version: pkgutil --pkg-info=com.apple.pkg.CLTools_Executables 2>/dev/null |
        awk '/^version:/ {print $2}'
      path: xcode-select -p 2>/dev/null || true
    actions:
      install: log_info "Triggering Xcode Command Line Tools install..."; xcode-select
        --install 2>/dev/null || true; log_warn "Xcode CLT installation triggered.
        Wait for it to complete, then re-run this script."; return 1
      update: xcode_clt_update
  homebrew:
    component: homebrew
    profile: configured
    type: package
    state_model: package
    display_name: Homebrew
    depends_on_by_platform:
      macos:
      - xcode-command-line-tools
    provided_by_tool: brew-installer
    driver:
      kind: custom
    observe_cmd: "if is_installed brew; then\n  brew --version 2>/dev/null | awk 'NR==1\
      \ {print $2}'\nelse\n  printf 'absent'\nfi\n"
    evidence:
      version: brew --version 2>/dev/null | awk 'NR==1 {print $2}'
      path: command -v brew 2>/dev/null || true
    actions:
      install: "_hb_shell_config=\"${shell_config_file}\"\n[[ \"${HOST_PLATFORM:-macos}\"\
        \ != \"macos\" && \"$_hb_shell_config\" == \".zprofile\" ]] && _hb_shell_config=\"\
        .profile\"\n/bin/bash -c \"$(curl -fsSL \"${installer_url}\")\"\nif [[ -x\
        \ /opt/homebrew/bin/brew ]]; then\n  grep -q 'opt/homebrew/bin/brew shellenv'\
        \ \"$HOME/${_hb_shell_config}\" 2>/dev/null || echo 'eval \"$(/opt/homebrew/bin/brew\
        \ shellenv)\"' >> \"$HOME/${_hb_shell_config}\"\n  eval \"$(/opt/homebrew/bin/brew\
        \ shellenv)\"\nelif [[ -x /usr/local/bin/brew ]]; then\n  grep -q 'usr/local/bin/brew\
        \ shellenv' \"$HOME/${_hb_shell_config}\" 2>/dev/null || echo 'eval \"$(/usr/local/bin/brew\
        \ shellenv)\"' >> \"$HOME/${_hb_shell_config}\"\n  eval \"$(/usr/local/bin/brew\
        \ shellenv)\"\nelif [[ -x /home/linuxbrew/.linuxbrew/bin/brew ]]; then\n \
        \ grep -q 'linuxbrew/.linuxbrew/bin/brew shellenv' \"$HOME/${_hb_shell_config}\"\
        \ 2>/dev/null || echo 'eval \"$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)\"\
        ' >> \"$HOME/${_hb_shell_config}\"\n  eval \"$(/home/linuxbrew/.linuxbrew/bin/brew\
        \ shellenv)\"\nfi\n"
      update: "_hb_shell_config=\"${shell_config_file}\"\n[[ \"${HOST_PLATFORM:-macos}\"\
        \ != \"macos\" && \"$_hb_shell_config\" == \".zprofile\" ]] && _hb_shell_config=\"\
        .profile\"\nif [[ -x /opt/homebrew/bin/brew ]]; then\n  grep -q 'opt/homebrew/bin/brew\
        \ shellenv' \"$HOME/${_hb_shell_config}\" 2>/dev/null || echo 'eval \"$(/opt/homebrew/bin/brew\
        \ shellenv)\"' >> \"$HOME/${_hb_shell_config}\"\n  eval \"$(/opt/homebrew/bin/brew\
        \ shellenv)\"\nelif [[ -x /usr/local/bin/brew ]]; then\n  grep -q 'usr/local/bin/brew\
        \ shellenv' \"$HOME/${_hb_shell_config}\" 2>/dev/null || echo 'eval \"$(/usr/local/bin/brew\
        \ shellenv)\"' >> \"$HOME/${_hb_shell_config}\"\n  eval \"$(/usr/local/bin/brew\
        \ shellenv)\"\nelif [[ -x /home/linuxbrew/.linuxbrew/bin/brew ]]; then\n \
        \ grep -q 'linuxbrew/.linuxbrew/bin/brew shellenv' \"$HOME/${_hb_shell_config}\"\
        \ 2>/dev/null || echo 'eval \"$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)\"\
        ' >> \"$HOME/${_hb_shell_config}\"\n  eval \"$(/home/linuxbrew/.linuxbrew/bin/brew\
        \ shellenv)\"\nfi\nbrew update && brew upgrade\n"
  brew-analytics=off:
    component: homebrew
    profile: parametric
    type: config
    state_model: parametric
    display_name: Homebrew analytics
    depends_on:
    - homebrew
    driver:
      kind: brew-analytics
    desired_value: ${analytics_desired}
installer_url: https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh
analytics_desired: 'off'
shell_config_file: .zprofile
