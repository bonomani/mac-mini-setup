component: homebrew
primary_profile: configured
libs: homebrew
runner: run_homebrew_from_yaml
on_fail: exit
platforms:
  - macos
  - linux
  - wsl2
platform_tool_preferences:
  macos:
    - brew-installer
  linux:
    - native-package-manager
    - brew-installer
  wsl2:
    - native-package-manager
    - brew-installer
targets:
  xcode-command-line-tools:
    component: homebrew
    profile: configured
    type: precondition
    provided_by_tool: macos-installer
    oracle:
      configured: "xcode-select -p >/dev/null 2>&1"

  homebrew:
    component: homebrew
    profile: configured
    type: package
    depends_on_by_platform:
      macos:
        - xcode-command-line-tools
    provided_by_tool: brew-installer
    oracle:
      configured: "brew --version >/dev/null 2>&1"

  "brew-analytics=off":
    component: homebrew
    profile: parametric
    type: config
    state_model: parametric
    depends_on:
      - homebrew
    observe_cmd: "brew analytics state 2>/dev/null | grep -qi disabled && echo off || echo on"
    desired_value: "${analytics_desired}"
    evidence_key: analytics
    install_cmd: "ucc_run brew analytics off"
installer_url: "https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh"
analytics_desired: "off"
shell_config_file: ".zprofile"
