component: macos-software-update
primary_profile: parametric
libs: macos_software_update
runner: run_macos_software_update_from_yaml
platforms:
- macos
softwareupdate_domain: /Library/Preferences/com.apple.SoftwareUpdate
targets:
  softwareupdate-schedule=on:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Software Update schedule
    soft_depends_on:
    - gate:sudo-available
    driver:
      kind: softwareupdate-schedule
    observe_cmd: if softwareupdate --schedule 2>/dev/null | grep -qiE 'Automatic check
      is on\\.?$'; then echo on; else echo off; fi
    desired_value: 'on'
    evidence:
      schedule: if softwareupdate --schedule 2>/dev/null | grep -qiE 'Automatic check
        is on\\.?$'; then echo on; else echo off; fi
    actions:
      install: ucc_run sudo softwareupdate --schedule on
    dependency_gate: sudo-available
  softwareupdate-auto-check=1:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Automatic update checks
    soft_depends_on:
    - gate:sudo-available
    driver:
      kind: softwareupdate-defaults
      domain: ${softwareupdate_domain}
      key: AutomaticCheckEnabled
    observe_cmd: if defaults read '${driver.domain}' '${driver.key}' 2>/dev/null |
      grep -qiE '^1$|^true$'; then echo 1; else echo 0; fi
    desired_value: '1'
    evidence:
      AutomaticCheckEnabled: defaults read '${driver.domain}' '${driver.key}' 2>/dev/null
        || echo 0
    actions:
      install: ucc_run sudo defaults write '${driver.domain}' '${driver.key}' -bool
        true
    dependency_gate: sudo-available
  softwareupdate-auto-download=1:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Automatic update downloads
    soft_depends_on:
    - gate:sudo-available
    driver:
      kind: softwareupdate-defaults
      domain: ${softwareupdate_domain}
      key: AutomaticDownload
    observe_cmd: if defaults read '${driver.domain}' '${driver.key}' 2>/dev/null |
      grep -qiE '^1$|^true$'; then echo 1; else echo 0; fi
    desired_value: '1'
    evidence:
      AutomaticDownload: defaults read '${driver.domain}' '${driver.key}' 2>/dev/null
        || echo 0
    actions:
      install: ucc_run sudo defaults write '${driver.domain}' '${driver.key}' -bool
        true
    dependency_gate: sudo-available
  softwareupdate-auto-install-macos=1:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Automatic macOS updates
    soft_depends_on:
    - gate:sudo-available
    driver:
      kind: softwareupdate-defaults
      domain: ${softwareupdate_domain}
      key: AutomaticallyInstallMacOSUpdates
    observe_cmd: if defaults read '${driver.domain}' '${driver.key}' 2>/dev/null |
      grep -qiE '^1$|^true$'; then echo 1; else echo 0; fi
    desired_value: '1'
    evidence:
      AutomaticallyInstallMacOSUpdates: defaults read '${driver.domain}' '${driver.key}'
        2>/dev/null || echo 0
    actions:
      install: ucc_run sudo defaults write '${driver.domain}' '${driver.key}' -bool
        true
    dependency_gate: sudo-available
  softwareupdate-config-data=1:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Configuration data updates
    soft_depends_on:
    - gate:sudo-available
    driver:
      kind: softwareupdate-defaults
      domain: ${softwareupdate_domain}
      key: ConfigDataInstall
    observe_cmd: if defaults read '${driver.domain}' '${driver.key}' 2>/dev/null |
      grep -qiE '^1$|^true$'; then echo 1; else echo 0; fi
    desired_value: '1'
    evidence:
      ConfigDataInstall: defaults read '${driver.domain}' '${driver.key}' 2>/dev/null
        || echo 0
    actions:
      install: ucc_run sudo defaults write '${driver.domain}' '${driver.key}' -bool
        true
    dependency_gate: sudo-available
  softwareupdate-critical-updates=1:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Security updates
    soft_depends_on:
    - gate:sudo-available
    driver:
      kind: softwareupdate-defaults
      domain: ${softwareupdate_domain}
      key: CriticalUpdateInstall
    observe_cmd: if defaults read '${driver.domain}' '${driver.key}' 2>/dev/null |
      grep -qiE '^1$|^true$'; then echo 1; else echo 0; fi
    desired_value: '1'
    evidence:
      CriticalUpdateInstall: defaults read '${driver.domain}' '${driver.key}' 2>/dev/null
        || echo 0
    actions:
      install: ucc_run sudo defaults write '${driver.domain}' '${driver.key}' -bool
        true
    dependency_gate: sudo-available
