component: macos-software-update
primary_profile: parametric
libs: macos_software_update
runner: run_macos_software_update_from_yaml
platforms:
- macos
softwareupdate_domain: /Library/Preferences/com.apple.SoftwareUpdate
targets:
  softwareupdate-schedule=on:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Software Update schedule
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: custom
    oracle:
      configured: if softwareupdate --schedule 2>/dev/null | grep -qiE 'Automatic check
        is on\.?$'; then echo on; else echo off; fi
    observe_cmd: if softwareupdate --schedule 2>/dev/null | grep -qiE 'Automatic check
      is on\.?$'; then echo on; else echo off; fi
    desired_value: 'on'
    evidence:
      schedule: if softwareupdate --schedule 2>/dev/null | grep -qiE 'Automatic check
        is on\.?$'; then echo on; else echo off; fi
    actions:
      install: softwareupdate_schedule_enable
    dependency_gate: sudo-available
  softwareupdate-auto-check=1:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Automatic update checks
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: softwareupdate-defaults
      domain: ${softwareupdate_domain}
      key: AutomaticCheckEnabled
      value: '1'
    desired_value: '1'
    evidence:
      AutomaticCheckEnabled: defaults read '${softwareupdate_domain}' AutomaticCheckEnabled
        2>/dev/null || echo 0
    dependency_gate: sudo-available
  softwareupdate-auto-download=1:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Automatic update downloads
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: softwareupdate-defaults
      domain: ${softwareupdate_domain}
      key: AutomaticDownload
      value: '1'
    desired_value: '1'
    evidence:
      AutomaticDownload: defaults read '${softwareupdate_domain}' AutomaticDownload
        2>/dev/null || echo 0
    dependency_gate: sudo-available
  softwareupdate-auto-install-macos=1:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Automatic macOS updates
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: softwareupdate-defaults
      domain: ${softwareupdate_domain}
      key: AutomaticallyInstallMacOSUpdates
      value: '1'
    desired_value: '1'
    evidence:
      AutomaticallyInstallMacOSUpdates: defaults read '${softwareupdate_domain}' AutomaticallyInstallMacOSUpdates
        2>/dev/null || echo 0
    dependency_gate: sudo-available
  softwareupdate-config-data=1:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Configuration data updates
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: softwareupdate-defaults
      domain: ${softwareupdate_domain}
      key: ConfigDataInstall
      value: '1'
    desired_value: '1'
    evidence:
      ConfigDataInstall: defaults read '${softwareupdate_domain}' ConfigDataInstall
        2>/dev/null || echo 0
    dependency_gate: sudo-available
  softwareupdate-critical-updates=1:
    component: macos-software-update
    profile: parametric
    type: config
    state_model: parametric
    display_name: Security updates
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: softwareupdate-defaults
      domain: ${softwareupdate_domain}
      key: CriticalUpdateInstall
      value: '1'
    desired_value: '1'
    evidence:
      CriticalUpdateInstall: defaults read '${softwareupdate_domain}' CriticalUpdateInstall
        2>/dev/null || echo 0
    dependency_gate: sudo-available
