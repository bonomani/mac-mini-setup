component: macos-defaults
primary_profile: parametric
libs: macos_defaults
runner: run_macos_defaults_from_yaml
platforms:
- macos
targets:
  pmset-ac-sleep=0:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: AC sleep
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: pmset
      setting: sleep
      value: '0'
    desired_value: '0'
    dependency_gate: sudo-available
  pmset-disksleep=0:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: Disk sleep
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: pmset
      setting: disksleep
      value: '0'
    desired_value: '0'
    dependency_gate: sudo-available
  pmset-standby=0:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: Standby
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: pmset
      setting: standby
      value: '0'
    desired_value: '0'
    dependency_gate: sudo-available
  app-nap=disabled:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: App Nap
    driver:
      kind: user-defaults
      domain: NSGlobalDomain
      key: NSAppSleepDisabled
      value: 'YES'
      type: bool
    desired_value: '1'
  finder-show-hidden=1:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: Finder hidden files
    driver:
      kind: user-defaults
      domain: com.apple.finder
      key: AppleShowAllFiles
      value: 'true'
      type: bool
    desired_value: '1'
  show-all-extensions=1:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: Filename extensions
    driver:
      kind: user-defaults
      domain: NSGlobalDomain
      key: AppleShowAllExtensions
      value: 'true'
      type: bool
    desired_value: '1'
  dock-autohide=1:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: Dock auto-hide
    driver:
      kind: user-defaults
      domain: com.apple.dock
      key: autohide
      value: 'true'
      type: bool
    desired_value: '1'
restart_processes:
- Finder
- Dock
- SystemUIServer
