component: macos-defaults
primary_profile: parametric
libs: macos_defaults
runner: run_macos_defaults_from_yaml
platforms:
  - macos
targets:
  pmset-ac-sleep=0:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    soft_depends_on:
      - gate:sudo-available
    dependency_gate: sudo-available
    oracle:
      configured: "pmset -g | grep -E '^ +sleep ' | awk '{print $2}' | grep -q '^0$'"
    observe_cmd: "pmset -g | awk '/^[[:space:]]+sleep / {print $2}'"
    desired_value: "0"
    evidence_key: sleep
    install_cmd: "ucc_run sudo pmset -c sleep 0"

  pmset-disksleep=0:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    soft_depends_on:
      - gate:sudo-available
    dependency_gate: sudo-available
    oracle:
      configured: "pmset -g | awk '/disksleep/ {print $2}' | grep -q '^0$'"
    observe_cmd: "pmset -g | awk '/disksleep/ {print $2}'"
    desired_value: "0"
    evidence_key: disksleep
    install_cmd: "ucc_run sudo pmset -c disksleep 0"

  pmset-standby=0:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    soft_depends_on:
      - gate:sudo-available
    dependency_gate: sudo-available
    oracle:
      configured: "pmset -g | awk '/^[[:space:]]+standby / {print $2}' | grep -q '^0$'"
    observe_cmd: "pmset -g | awk '/^[[:space:]]+standby / {print $2}'"
    desired_value: "0"
    evidence_key: standby
    install_cmd: "ucc_run sudo pmset -c standby 0"

  app-nap=disabled:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    soft_depends_on:
      - gate:sudo-available
    dependency_gate: sudo-available
    oracle:
      configured: "defaults read NSGlobalDomain NSAppSleepDisabled 2>/dev/null | grep -q '^1$'"
    observe_cmd: "defaults read NSGlobalDomain NSAppSleepDisabled 2>/dev/null || echo 0"
    desired_value: "1"
    evidence_key: NSAppSleepDisabled
    install_cmd: "ucc_run defaults write NSGlobalDomain NSAppSleepDisabled -bool YES"

  finder-show-hidden=1:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    soft_depends_on:
      - gate:sudo-available
    dependency_gate: sudo-available
    oracle:
      configured: "defaults read com.apple.finder AppleShowAllFiles 2>/dev/null | grep -qi '^1$\\|^true$'"
    observe_cmd: "defaults read com.apple.finder AppleShowAllFiles 2>/dev/null || echo 0"
    desired_value: "1"
    evidence_key: AppleShowAllFiles
    install_cmd: "ucc_run defaults write com.apple.finder AppleShowAllFiles -bool true"

  show-all-extensions=1:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    soft_depends_on:
      - gate:sudo-available
    dependency_gate: sudo-available
    oracle:
      configured: "defaults read NSGlobalDomain AppleShowAllExtensions 2>/dev/null | grep -qi '^1$\\|^true$'"
    observe_cmd: "defaults read NSGlobalDomain AppleShowAllExtensions 2>/dev/null || echo 0"
    desired_value: "1"
    evidence_key: AppleShowAllExtensions
    install_cmd: "ucc_run defaults write NSGlobalDomain AppleShowAllExtensions -bool true"

  dock-autohide=1:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    soft_depends_on:
      - gate:sudo-available
    dependency_gate: sudo-available
    oracle:
      configured: "defaults read com.apple.dock autohide 2>/dev/null | grep -qi '^1$\\|^true$'"
    observe_cmd: "defaults read com.apple.dock autohide 2>/dev/null || echo 0"
    desired_value: "1"
    evidence_key: autohide
    install_cmd: "ucc_run defaults write com.apple.dock autohide -bool true"
restart_processes:
  - Finder
  - Dock
  - SystemUIServer
