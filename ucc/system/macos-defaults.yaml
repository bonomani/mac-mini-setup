component: macos-defaults
primary_profile: parametric
libs: macos_defaults
runner: run_macos_defaults_from_yaml
platforms:
- macos
targets:
  pmset-ac-sleep=0:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: AC sleep
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: pmset
    oracle:
      configured: pmset -g | grep -E '^ +sleep ' | awk '{print $2}' | grep -q '^0$'
    observe_cmd: pmset -g | awk '/^[[:space:]]+sleep / {print $2}'
    desired_value: '0'
    evidence:
      sleep: pmset -g | awk '/^[[:space:]]+sleep / {print $2}'
    actions:
      install: ucc_run sudo pmset -c sleep 0
    dependency_gate: sudo-available
  pmset-disksleep=0:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: Disk sleep
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: pmset
    oracle:
      configured: pmset -g | awk '/disksleep/ {print $2}' | grep -q '^0$'
    observe_cmd: pmset -g | awk '/disksleep/ {print $2}'
    desired_value: '0'
    evidence:
      disksleep: pmset -g | awk '/disksleep/ {print $2}'
    actions:
      install: ucc_run sudo pmset -c disksleep 0
    dependency_gate: sudo-available
  pmset-standby=0:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: Standby
    soft_depends_on:
    - gate:sudo-available
    admin_required: true
    driver:
      kind: pmset
    oracle:
      configured: pmset -g | awk '/^[[:space:]]+standby / {print $2}' | grep -q '^0$'
    observe_cmd: pmset -g | awk '/^[[:space:]]+standby / {print $2}'
    desired_value: '0'
    evidence:
      standby: pmset -g | awk '/^[[:space:]]+standby / {print $2}'
    actions:
      install: ucc_run sudo pmset -c standby 0
    dependency_gate: sudo-available
  app-nap=disabled:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: App Nap
    driver:
      kind: user-defaults
    oracle:
      configured: defaults read NSGlobalDomain NSAppSleepDisabled 2>/dev/null | grep
        -q '^1$'
    observe_cmd: defaults read NSGlobalDomain NSAppSleepDisabled 2>/dev/null || echo
      0
    desired_value: '1'
    evidence:
      NSAppSleepDisabled: defaults read NSGlobalDomain NSAppSleepDisabled 2>/dev/null
        || echo 0
    actions:
      install: ucc_run defaults write NSGlobalDomain NSAppSleepDisabled -bool YES
  finder-show-hidden=1:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: Finder hidden files
    driver:
      kind: user-defaults
    oracle:
      configured: defaults read com.apple.finder AppleShowAllFiles 2>/dev/null | grep
        -qi '^1$\|^true$'
    observe_cmd: defaults read com.apple.finder AppleShowAllFiles 2>/dev/null || echo
      0
    desired_value: '1'
    evidence:
      AppleShowAllFiles: defaults read com.apple.finder AppleShowAllFiles 2>/dev/null
        || echo 0
    actions:
      install: ucc_run defaults write com.apple.finder AppleShowAllFiles -bool true
  show-all-extensions=1:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: Filename extensions
    driver:
      kind: user-defaults
    oracle:
      configured: defaults read NSGlobalDomain AppleShowAllExtensions 2>/dev/null
        | grep -qi '^1$\|^true$'
    observe_cmd: defaults read NSGlobalDomain AppleShowAllExtensions 2>/dev/null ||
      echo 0
    desired_value: '1'
    evidence:
      AppleShowAllExtensions: defaults read NSGlobalDomain AppleShowAllExtensions
        2>/dev/null || echo 0
    actions:
      install: ucc_run defaults write NSGlobalDomain AppleShowAllExtensions -bool
        true
  dock-autohide=1:
    component: macos-defaults
    profile: parametric
    type: config
    state_model: parametric
    display_name: Dock auto-hide
    driver:
      kind: user-defaults
    oracle:
      configured: defaults read com.apple.dock autohide 2>/dev/null | grep -qi '^1$\|^true$'
    observe_cmd: defaults read com.apple.dock autohide 2>/dev/null || echo 0
    desired_value: '1'
    evidence:
      autohide: defaults read com.apple.dock autohide 2>/dev/null || echo 0
    actions:
      install: ucc_run defaults write com.apple.dock autohide -bool true
restart_processes:
- Finder
- Dock
- SystemUIServer
