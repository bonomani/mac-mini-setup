component: git-config
primary_profile: configured
libs: git
runner: run_git_config_from_yaml
platforms:
- macos
- linux
- wsl2
targets:
  git-global-config:
    component: git-config
    profile: configured
    type: config
    state_model: config
    display_name: Git global config
    depends_on:
    - git
    driver:
      kind: custom
    oracle:
      configured: git_global_user_name_is_set
    evidence:
      user: git_global_user_name
      email: git_global_user_email
    actions:
      install: _git_global_config_interactive "$CFG_DIR" "$YAML_PATH"
global_config:
- key: init.defaultBranch
  value: main
- key: pull.rebase
  value: 'false'
- key: core.autocrlf
  value: input
