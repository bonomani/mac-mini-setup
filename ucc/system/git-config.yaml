component: git-config
primary_profile: configured
libs: git
runner: run_git_config_from_yaml

targets:
  git-global-config:
    component: git-config
    profile: configured
    type: config
    depends_on:
      - git
    oracle:
      configured: "git config --global user.name >/dev/null 2>&1"

global_config:
  - key: init.defaultBranch
    value: main
  - key: pull.rebase
    value: "false"
  - key: core.autocrlf
    value: input
