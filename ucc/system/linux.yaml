component: linux-system
primary_profile: capability
libs: linux_system
runner: run_linux_system_from_yaml
on_fail: ignore
platforms:
- linux
- wsl2
targets:
  cgroup2-available:
    component: linux-system
    profile: capability
    type: capability
    display_name: cgroup v2 (unified hierarchy)
    driver:
      kind: capability
      probe: cgroup2_is_available
    evidence:
      fstype: cgroup2_fstype
    requires: linux,wsl2
  systemd-available:
    component: linux-system
    profile: capability
    type: capability
    display_name: systemd (PID 1)
    driver:
      kind: capability
      probe: systemd_is_available
    evidence:
      version: systemd_version
    requires: linux,wsl2
  user-linger-enabled:
    component: linux-system
    profile: capability
    type: capability
    display_name: user systemd linger
    depends_on:
    - systemd-available
    driver:
      kind: capability
      probe: user_linger_is_enabled
    evidence:
      user: echo_var "${USER}"
    requires: linux,wsl2
