component: system
primary_profile: parametric
libs: system
runner: run_system_from_yaml
on_fail: ignore
platforms:
- macos
softwareupdate_domain: /Library/Preferences/com.apple.SoftwareUpdate
restart_processes:
- Finder
- Dock
- SystemUIServer
targets:
  sudo-available:
    component: system
    profile: capability
    type: capability
    display_name: sudo access
    driver:
      kind: capability
      probe: sudo_is_available
    evidence:
      status: sudo_is_available
  pmset-ac-sleep=0:
    component: system
    profile: parametric
    type: config
    display_name: AC sleep
    admin_required: true
    driver:
      kind: setting
      key: sleep
      backend: pmset
      value: '0'
      requires_sudo: true
    desired_value: '0'
  pmset-disksleep=0:
    component: system
    profile: parametric
    type: config
    display_name: Disk sleep
    admin_required: true
    driver:
      kind: setting
      key: disksleep
      backend: pmset
      value: '0'
      requires_sudo: true
    desired_value: '0'
  pmset-standby=0:
    component: system
    profile: parametric
    type: config
    display_name: Standby
    admin_required: true
    driver:
      kind: setting
      key: standby
      backend: pmset
      value: '0'
      requires_sudo: true
    desired_value: '0'
  app-nap=disabled:
    component: system
    profile: parametric
    type: config
    display_name: App Nap
    driver:
      kind: setting
      domain: NSGlobalDomain
      key: NSAppSleepDisabled
      backend: defaults
      value: 'YES'
      type: bool
    desired_value: '1'
  finder-show-hidden=1:
    component: system
    profile: parametric
    type: config
    display_name: Finder hidden files
    driver:
      kind: setting
      domain: com.apple.finder
      key: AppleShowAllFiles
      backend: defaults
      value: 'true'
      type: bool
    desired_value: '1'
  show-all-extensions=1:
    component: system
    profile: parametric
    type: config
    display_name: Filename extensions
    driver:
      kind: setting
      domain: NSGlobalDomain
      key: AppleShowAllExtensions
      backend: defaults
      value: 'true'
      type: bool
    desired_value: '1'
  dock-autohide=1:
    component: system
    profile: parametric
    type: config
    display_name: Dock auto-hide
    driver:
      kind: setting
      domain: com.apple.dock
      key: autohide
      backend: defaults
      value: 'true'
      type: bool
    desired_value: '1'
  softwareupdate-schedule=on:
    component: system
    profile: parametric
    type: config
    display_name: Software Update schedule
    admin_required: true
    driver:
      kind: softwareupdate-schedule
    desired_value: 'on'
  softwareupdate-auto-check=1:
    component: system
    profile: parametric
    type: config
    display_name: Automatic update checks
    admin_required: true
    driver:
      kind: setting
      domain: ${softwareupdate_domain}
      key: AutomaticCheckEnabled
      backend: defaults
      requires_sudo: true
      value: '1'
    desired_value: '1'
  softwareupdate-auto-download=1:
    component: system
    profile: parametric
    type: config
    display_name: Automatic update downloads
    admin_required: true
    driver:
      kind: setting
      domain: ${softwareupdate_domain}
      key: AutomaticDownload
      backend: defaults
      requires_sudo: true
      value: '1'
    desired_value: '1'
  softwareupdate-auto-install-macos=1:
    component: system
    profile: parametric
    type: config
    display_name: Automatic macOS updates
    admin_required: true
    driver:
      kind: setting
      domain: ${softwareupdate_domain}
      key: AutomaticallyInstallMacOSUpdates
      backend: defaults
      requires_sudo: true
      value: '1'
    desired_value: '1'
  softwareupdate-config-data=1:
    component: system
    profile: parametric
    type: config
    display_name: Configuration data updates
    admin_required: true
    driver:
      kind: setting
      domain: ${softwareupdate_domain}
      key: ConfigDataInstall
      backend: defaults
      requires_sudo: true
      value: '1'
    desired_value: '1'
  softwareupdate-critical-updates=1:
    component: system
    profile: parametric
    type: config
    display_name: Security updates
    admin_required: true
    driver:
      kind: setting
      domain: ${softwareupdate_domain}
      key: CriticalUpdateInstall
      backend: defaults
      requires_sudo: true
      value: '1'
    desired_value: '1'
  system-composition:
    component: system
    profile: parametric
    type: config
    display_name: System composition
    depends_on:
    - sudo-available
    - pmset-ac-sleep=0
    - pmset-disksleep=0
    - pmset-standby=0
    - app-nap=disabled
    - finder-show-hidden=1
    - show-all-extensions=1
    - dock-autohide=1
    - softwareupdate-schedule=on
    - softwareupdate-auto-check=1
    - softwareupdate-auto-download=1
    - softwareupdate-auto-install-macos=1
    - softwareupdate-config-data=1
    - softwareupdate-critical-updates=1
    driver:
      kind: custom
    evidence:
      kind: echo_var "os-config"
