component: system
primary_profile: parametric
libs: system
runner: run_system_from_yaml
on_fail: ignore
platforms:
- macos
system:
  kind: host-composition
  depends_on:
  - homebrew
  - git
  - docker-desktop
  - python
  - ollama
  - open-webui-runtime
  - flowise-runtime
  - openhands-runtime
  - n8n-runtime
  - qdrant-runtime
  - ariaflow
  - ariaflow-web
  - unsloth-studio
  - git-global-config
  - softwareupdate-schedule=on
  - softwareupdate-auto-check=1
  - softwareupdate-auto-download=1
  - softwareupdate-auto-install-macos=1
  - softwareupdate-config-data=1
  - softwareupdate-critical-updates=1
  - pmset-ac-sleep=0
  - finder-show-hidden=1
targets:
  system-composition:
    component: system
    profile: parametric
    type: config
    state_model: parametric
    display_name: System composition
    depends_on:
    - homebrew
    - git
    - docker-desktop
    - python
    - ollama
    - open-webui-runtime
    - flowise-runtime
    - openhands-runtime
    - n8n-runtime
    - qdrant-runtime
    - ariaflow
    - ariaflow-web
    - unsloth-studio
    - git-global-config
    - softwareupdate-schedule=on
    - softwareupdate-auto-check=1
    - softwareupdate-auto-download=1
    - softwareupdate-auto-install-macos=1
    - softwareupdate-config-data=1
    - softwareupdate-critical-updates=1
    - pmset-ac-sleep=0
    - finder-show-hidden=1
    driver:
      kind: custom
    evidence:
      kind: echo_var "${system_kind}"
