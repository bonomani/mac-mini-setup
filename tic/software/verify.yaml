# TIC software observation — post-convergence presence and service health assertions
# oracle strings: evaluated via bash eval — $VAR references expand at test time

tests:
  # ── ai-python-stack ───────────────────────────────────────
  # pip_group targets are generated dynamically — no explicit target entry for oracle:
  - name: torch-importable
    component: ai-python-stack
    intent: "torch must be importable"
    oracle: "python3 -c 'import torch'"
    trace: "component:ai-python-stack / ucc-target:pip-group-pytorch"
  - name: transformers-importable
    component: ai-python-stack
    intent: "transformers must be importable"
    oracle: "python3 -c 'import transformers'"
    trace: "component:ai-python-stack / ucc-target:pip-group-huggingface"
  - name: langchain-importable
    component: ai-python-stack
    intent: "langchain must be importable"
    oracle: "python3 -c 'import langchain'"
    trace: "component:ai-python-stack / ucc-target:pip-group-langchain"
  - name: langchain-core-version
    component: ai-python-stack
    intent: "langchain-core must be >=1.0.0 (required by langgraph and langchain-ollama)"
    oracle: "pip show langchain-core 2>/dev/null | grep -E '^Version: [1-9]'"
    trace: "component:ai-python-stack / ucc-target:pip-group-langchain"
  - name: unsloth-importable
    component: ai-python-stack
    intent: "unsloth Python package is not importable on Apple Silicon (NVIDIA/AMD only)"
    oracle: "python3 -c 'import unsloth'"
    trace: "component:ai-python-stack / ucc-target:unsloth-studio"
    skip: "not importable on Apple Silicon (NVIDIA only) — Studio runs in its own venv"
    skip_when: '_tic_target_status_is "mps-available" "ok"'
  # ── dev-tools ─────────────────────────────────────────────
  # cli_tools and npm_packages have no explicit target entries for oracle:
  - name: cmake-installed
    component: dev-tools
    intent: "cmake must be present (required for Unsloth GGUF inference)"
    oracle: "cmake --version >/dev/null 2>&1"
    trace: "component:dev-tools / cli-cmake"

  # ── ai-apps ───────────────────────────────────────────────
  - name: open-webui-health
    component: ai-apps
    intent: "Open WebUI must be accessible on port 3000"
    oracle: "curl -fsS --connect-timeout 5 http://localhost:3000 >/dev/null"
    trace: "component:ai-apps / service:open-webui"
    skip_when: '_tic_service_not_running "open-webui"'

  - name: flowise-health
    component: ai-apps
    intent: "Flowise must be accessible on port 3001"
    oracle: "curl -fsS --connect-timeout 5 http://localhost:3001 >/dev/null"
    trace: "component:ai-apps / service:flowise"
    skip_when: '_tic_service_not_running "flowise"'

  - name: openhands-health
    component: ai-apps
    intent: "OpenHands must be accessible on port 3002"
    oracle: "curl -fsS --connect-timeout 5 http://localhost:3002 >/dev/null"
    trace: "component:ai-apps / service:openhands"
    skip_when: '_tic_service_not_running "openhands"'

  - name: n8n-health
    component: ai-apps
    intent: "n8n must be accessible on port 5678"
    oracle: "curl -fsS --connect-timeout 5 http://localhost:5678 >/dev/null"
    trace: "component:ai-apps / service:n8n"
    skip_when: '_tic_service_not_running "n8n"'

  - name: qdrant-health
    component: ai-apps
    intent: "Qdrant must be accessible on port 6333"
    oracle: "curl -fsS --connect-timeout 5 http://localhost:6333 >/dev/null"
    trace: "component:ai-apps / service:qdrant"
    skip_when: '_tic_service_not_running "qdrant"'
