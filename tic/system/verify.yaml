# TIC system observation — post-convergence machine-state value assertions
# oracle strings: evaluated via bash eval — $VAR references expand at test time
verification_for:
  component: system
  ucc_target: system-composition
  role: post-convergence verification evidence

tests:
  - name: system-composition-converged
    component: system
    requires_status_target: system-composition
    intent: "system-composition must converge before system verification is accepted"
    oracle: "awk -F'|' '$1==\"system-composition\" {val=$2} END {exit !(val==\"ok\")}' \"${UCC_TARGET_STATUS_FILE:-/dev/null}\""
    trace: "component:system / ucc-target:system-composition / tic-suite:system"
