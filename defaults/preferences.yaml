preferences:
  - name: default-selection
    default: all
    options: all|none
    rationale: 'all: install/update everything when no targets specified; none: show current state only (select targets explicitly)'
  - name: skip-display-mode
    default: full
    options: full|fast
    rationale: 'full: show every target with current state and version (slower observe); fast: hide non-selected targets entirely (faster runs)'
  - name: destructive-updates
    default: 'off'
    options: on|off
    rationale: off prevents destructive container/package replacement without explicit operator intent; on allows full reimaging on update
  - name: service-policy
    default: autostart
    options: manual|autostart
    rationale: 'autostart: script starts required services (Docker, Ollama) when not running; manual: operator starts services before running the script'
  - name: update-policy
    default: balanced
    options: conservative|balanced|aggressive
    rationale: 'conservative: install only, no upstream checks; balanced: auto-upgrade tools, hold libs stable, upstream checks on; aggressive: upgrade everything including libs'
  - name: preferred-driver-policy
    default: warn
    options: ignore|warn|migrate
    rationale: 'ignore accepts software found outside the preferred install driver; warn reports drift without changing it; migrate allows supported targets to converve to the preferred driver'
