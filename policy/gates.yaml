gates:
  - name: macos-platform
    condition: _gate_macos
    scope: global
    class: readiness
    target_state: host installation_state=Configured
    blocking: hard
  - name: apple-silicon
    condition: _gate_arm64
    scope: global
    class: readiness
    target_state: host dependency_state=DepsReady
    blocking: soft
  - name: docker-daemon
    condition: _gate_docker_daemon
    scope: component:07-ai-apps
    class: readiness
    target_state: 07-ai-apps runtime_state=Running dependency_state=DepsReady
    blocking: soft
  - name: docker-settings-file
    condition: _gate_docker_settings
    scope: component:03-docker
    class: readiness
    target_state: 03-docker installation_state=Configured dependency_state=DepsReady
    blocking: soft
  - name: ollama-api
    condition: _gate_ollama_api
    scope: component:05-ollama
    class: readiness
    target_state: 05-ollama runtime_state=Running dependency_state=DepsReady
    blocking: soft
  - name: sudo-available
    condition: _gate_sudo
    scope: component:09-macos-defaults
    class: authorization
    target_state: 09-macos-defaults admin_state=Enabled dependency_state=DepsReady
    blocking: soft
