gates:
  - name: supported-platform
    condition: _gate_supported_platform
    scope: global
    class: readiness
    target_state: host installation_state=Configured
    blocking: hard
  - name: apple-silicon
    condition: _gate_arm64
    scope: component:ai-python-stack
    class: readiness
    target_state: ai-python-stack dependency_state=DepsReady
    blocking: soft
  - name: ai-apps-template
    condition: _gate_ai_apps_template
    scope: component:ai-apps
    class: integrity
    target_state: ai-apps installation_state=Configured dependency_state=DepsReady
    blocking: hard
  - name: docker-settings-file
    condition: _gate_docker_settings
    scope: component:docker
    class: readiness
    target_state: docker installation_state=Configured dependency_state=DepsReady
    blocking: soft
  - name: ollama-api
    condition: _gate_ollama_api
    scope: component:ai-apps
    class: readiness
    target_state: ai-apps runtime_state=Running dependency_state=DepsReady
    blocking: soft
  - name: networkquality-available
    condition: _gate_networkquality
    scope: component:dev-tools
    class: readiness
    target_state: ariaflow dependency_state=DepsReady
    blocking: soft
  - name: sudo-available
    condition: _gate_sudo
    scope: component:macos-defaults
    class: authorization
    target_state: macos-defaults admin_state=Enabled dependency_state=DepsReady
    blocking: soft
